<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Niche Spider</title>
<link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/styles/vis-network.min.css" rel="stylesheet" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
(function () {
  try {
    var tg = window.Telegram && window.Telegram.WebApp;
    var theme = tg && tg.colorScheme === 'light' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  } catch (_) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<style>
:root,
[data-theme="dark"] {
  color-scheme: dark;
  --tg-bg:       #0a0a0a;
  --tg-text:     #f5f0e6;
  --tg-btn:      #C9A66B;
  --tg-btn-text: #1a1408;
  --tg-hint:     #9a8f6e;
  --tg-secondary:#141414;
  --tg-link:     #D4A574;
  --surface:     #141414;
  --input-bg:    #101010;
  --msg-ai-bg:   #1a1a1a;
  --card:        #1a1a1a;
  --graph-bg:    #0a0a0a;
  --panel-surface: rgba(18,18,20,0.96);
  --panel-float: rgba(18,18,20,0.78);
  --panel-text:  #f5f0e6;
  --chip-bg:     rgba(22,22,26,0.9);
  --chip-text:   #f5f0e6;
  --overlay-bg:  rgba(12,12,14,0.88);
  --border:      rgba(201, 166, 107, 0.14);
  --radius:      14px;
  --accent:      #C9A66B;
  --accent2:     #F0E0C8;
  --danger:      #c45c5c;
  --success:     #5c9a72;
  --warn:        #D4A574;
  --muted:       #6b6350;
  --lux-gold:    #D4A574;
  --lux-gold-dark:#9A7B4F;
  --lux-gold-dim:rgba(201, 166, 107, 0.22);
  --lux-gold-glow:rgba(201, 166, 107, 0.32);
  --lux-ink:     #0a0a0a;
  --lux-pearl:   #FFF9E3;
  --gold-gradient: linear-gradient(135deg, #F5E6D3 0%, #D4A574 38%, #C9A66B 62%, #9A7B4F 100%);
  --gold-gradient-btn: linear-gradient(180deg, #E8C9A0 0%, #C9A66B 48%, #8B6914 100%);
}

[data-theme="light"] {
  color-scheme: light;
  --tg-bg:       #ffffff;
  --tg-text:     #1a1408;
  --tg-hint:     #6b5340;
  --tg-secondary:#f5f0eb;
  --surface:     #ffffff;
  --input-bg:    #ffffff;
  --msg-ai-bg:   #fff8ee;
  --card:        #fff8ee;
  --graph-bg:    #ebe4d8;
  --panel-surface: rgba(255,252,247,0.98);
  --panel-float: rgba(255,255,255,0.94);
  --panel-text:  #1a1408;
  --chip-bg:     #fff8ee;
  --chip-text:   #1a1408;
  --overlay-bg:  rgba(245,240,235,0.92);
  --border:      rgba(154, 123, 79, 0.28);
  --accent2:     #6b5340;
  --muted:       #8a7f6e;
  --lux-pearl:   #1a1408;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-bg);
  color: var(--tg-text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Layout ────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: var(--app-height, 100dvh);
}

/* ── Header ────────────────────────────────── */
#header {
  flex: 0 0 auto;
  padding: 10px 14px 8px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
#header img { display: none !important; }
#header-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--tg-text);
  flex: 1;
  letter-spacing: -0.02em;
}
#header-title span {
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
#header-badge {
  font-size: 10px;
  font-weight: 700;
  background: rgba(201, 166, 107, 0.1);
  color: var(--lux-gold);
  border: 1px solid rgba(201, 166, 107, 0.38);
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.08em;
  text-shadow: 0 0 12px rgba(201, 166, 107, 0.25);
}

/* ── Input bar ─────────────────────────────── */
#input-bar {
  flex: 0 0 auto;
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
#queryInput {
  flex: 1;
  padding: 10px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background-color: var(--input-bg);
  color: var(--tg-text);
  font-size: 15px;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
#queryInput:focus { border-color: var(--accent); }
#queryInput::placeholder { color: var(--muted); }
#buildBtn {
  flex: 0 0 auto;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius);
  background: var(--gold-gradient-btn);
  color: #1a1408;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: filter .15s, transform .1s, box-shadow .15s;
  white-space: nowrap;
  box-shadow: 0 2px 16px rgba(201, 166, 107, 0.28), inset 0 1px 0 rgba(255, 249, 227, 0.45);
}
#buildBtn:active { filter: brightness(0.92); transform: scale(.97); }

/* ── Chat panel ────────────────────────────── */
#chat-panel {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 8px 12px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  max-height: 38vh;
  transition: max-height .25s ease, padding .25s ease;
}
#chat-panel.collapsed {
  max-height: 42px;
  padding: 6px 12px;
  gap: 0;
  overflow: hidden;
}
#chat-panel.collapsed #chat-log,
#chat-panel.collapsed #chat-input-row,
#chat-panel.collapsed #chat-choice-row {
  display: none;
}
#chat-panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}
#chat-panel-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--tg-hint);
  letter-spacing: 0.02em;
}
#chat-free-badge {
  font-size: 10px;
  font-weight: 700;
  color: var(--lux-gold);
  background: rgba(201, 166, 107, 0.1);
  border: 1px solid rgba(201, 166, 107, 0.32);
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: auto;
  margin-right: 6px;
}
#chatToggleBtn {
  flex: 0 0 auto;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background-color: var(--input-bg);
  color: var(--tg-text);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
#chatToggleBtn:active { opacity: .85; }
#chat-log {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 28vh;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#chat-log::-webkit-scrollbar { width: 4px; }
#chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chat-msg {
  max-width: 88%;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: #1a1408;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start;
  background: var(--msg-ai-bg);
  color: var(--tg-text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-msg.ai .ai-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 4px;
  display: block;
}

.chat-msg-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-width: 88%;
}
.chat-msg-wrap.user { align-self: flex-end; }
.chat-msg-wrap.ai   { align-self: flex-start; }
.chat-msg-wrap .chat-msg { max-width: 100%; }

.chat-examples {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  padding-left: 2px;
}
.examples-btn {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--lux-gold, var(--accent));
  background: rgba(201, 166, 107,0.08);
  border: 1px solid rgba(201, 166, 107,0.28);
  border-radius: 999px;
  padding: 4px 10px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.examples-btn.open {
  background: rgba(201, 166, 107,0.16);
  border-color: rgba(201, 166, 107,0.45);
}
.examples-btn:active { transform: scale(0.97); }
.examples-panel {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-width: 100%;
}
.examples-panel.hidden { display: none; }
.example-chip {
  font-size: 11.5px;
  line-height: 1.3;
  color: var(--tg-text);
  background: var(--chip-bg);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 10px;
  cursor: pointer;
  text-align: left;
  transition: border-color .15s, background .15s;
}
.example-chip:active {
  border-color: rgba(201, 166, 107,0.45);
  background: rgba(201, 166, 107,0.1);
}

#chat-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
#chatInput {
  flex: 1;
  padding: 9px 13px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background-color: var(--input-bg);
  color: var(--tg-text);
  font-size: 14px;
  outline: none;
  resize: none;
  transition: border-color .15s;
  min-height: 38px;
  max-height: 80px;
  -webkit-appearance: none;
  appearance: none;
}
#chatInput:focus { border-color: var(--accent); }
#chatInput::placeholder { color: var(--muted); }
#sendChatBtn {
  flex: 0 0 auto;
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 50%;
  background: var(--accent);
  color: #1a1408;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s;
}
#sendChatBtn:active { background: var(--lux-gold-dark); transform: scale(.93); }

#chat-choice-row {
  display: none;
  gap: 8px;
  padding-top: 2px;
}
#chat-choice-row.visible {
  display: flex;
}
#chat-choice-row button {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s;
}
#chat-choice-row button:active { transform: scale(.97); }
#buildGraphChoiceBtn {
  background: linear-gradient(135deg, rgba(201, 166, 107,0.22), rgba(201, 166, 107,0.08));
  color: var(--lux-gold, var(--accent));
  border-color: rgba(201, 166, 107,0.35);
}
#continueInterviewBtn {
  background-color: var(--input-bg);
  color: var(--tg-text);
}

/* ── Status bar ────────────────────────────── */
#status-bar {
  flex: 0 0 auto;
  padding: 5px 14px;
  font-size: 11.5px;
  color: var(--tg-hint);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  min-height: 26px;
}
#status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background .2s;
}
#status-dot.ok   { background: var(--success); }
#status-dot.busy { background: var(--warn); animation: pulse 1s infinite; }
#status-dot.err  { background: var(--danger); }
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .4; }
}

/* ── Graph area (luxury) ───────────────────── */
#graph-container {
  flex: 1 1 0;
  position: relative;
  background: var(--graph-bg);
  min-height: 0;
  max-height: 100%;
  overflow: hidden;
  contain: strict;
}
.graph-stage {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.graph-grid {
  position: absolute;
  inset: 0;
  opacity: 0.45;
  background-image:
    linear-gradient(rgba(201, 166, 107,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 166, 107,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: radial-gradient(ellipse 85% 75% at 50% 45%, #000 20%, transparent 100%);
  pointer-events: none;
}
.graph-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(64px);
  pointer-events: none;
  opacity: 0.55;
}
.graph-glow-a {
  width: 42vmin;
  height: 42vmin;
  top: -8%;
  left: -6%;
  background: rgba(201, 166, 107,0.14);
}
.graph-glow-b {
  width: 36vmin;
  height: 36vmin;
  right: -8%;
  bottom: 6%;
  background: rgba(184, 134, 11, 0.14);
}
.graph-vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 90% 80% at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%),
    linear-gradient(180deg, rgba(12,12,14,0.35) 0%, transparent 18%, transparent 82%, rgba(12,12,14,0.5) 100%);
}
[data-theme="light"] .graph-vignette {
  background:
    radial-gradient(ellipse 90% 80% at 50% 50%, transparent 50%, rgba(0,0,0,0.06) 100%),
    linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 20%, transparent 80%, rgba(255,255,255,0.25) 100%);
  opacity: 0.7;
}
[data-theme="light"] .graph-glow { opacity: 0.25; }
#mynetwork {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
  background: transparent;
  z-index: 1;
}
.graph-legend {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 8;
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  pointer-events: none;
}
.graph-legend.visible { display: flex; }
.legend-chip {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--panel-text);
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid var(--lc, var(--lux-gold-dim));
  background: var(--panel-float);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
#graph-tools {
  position: absolute;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 2px;
  padding: 4px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--panel-float);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  z-index: 12;
}
.gt-btn {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--panel-text);
  font-size: 18px;
  font-weight: 300;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s ease, color .2s ease, transform .12s ease;
}
.gt-btn:hover { background: rgba(255,255,255,0.06); }
.gt-btn:active {
  transform: scale(0.94);
  background: rgba(201, 166, 107,0.18);
  color: var(--lux-gold);
}
.gt-btn-save {
  width: auto;
  min-width: 40px;
  padding: 0 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--lux-gold, var(--accent));
}
.gt-btn-save:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}
.gt-divider {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 2px;
}

/* ── Fallback list ─────────────────────────── */
#fallback-list {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 14px;
  background: var(--tg-bg);
  display: none;
}
#fallback-list.visible { display: block; }
#fallback-list h3 { font-size: 14px; color: var(--tg-hint); margin-bottom: 10px; }
.chip {
  display: inline-block;
  margin: 4px 6px 4px 0;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--chip-text);
  border: 1px solid var(--border);
  background: var(--chip-bg);
}
.chip.root       { border-color: rgba(201, 166, 107, 0.55); color: var(--lux-gold); }
.chip.product    { border-color: rgba(92,122,110,0.5); }
.chip.supplier   { border-color: rgba(138,115,85,0.5); }
.chip.competitor { border-color: rgba(122,92,110,0.5); }
.chip.audience   { border-color: rgba(107,101,137,0.5); }
.chip.channel    { border-color: rgba(74,107,138,0.5); }
.chip.economics  { border-color: rgba(74,122,98,0.5); }
.chip.risk       { border-color: rgba(138,74,82,0.5); }
.chip.category   { border-color: rgba(201, 166, 107, 0.35); }
.chip.plan       { border-color: rgba(255,255,255,0.12); }

/* ── Loading overlay ───────────────────────── */
#loading-overlay {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: var(--overlay-bg);
  backdrop-filter: blur(12px);
  z-index: 9998;
}
#loading-overlay.visible { display: flex; }
#app.api-busy #buildBtn,
#app.api-busy #sendChatBtn,
#app.api-busy #chatInput,
#app.api-busy #queryInput,
#app.api-busy #gtSave,
#app.api-busy #buildGraphChoiceBtn,
#app.api-busy #continueInterviewBtn,
#app.api-busy #askNodeBtn,
#app.api-busy #gtZoomIn,
#app.api-busy #gtZoomOut,
#app.api-busy #gtFit {
  pointer-events: none;
  opacity: 0.55;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255,255,255,0.08);
  border-top-color: var(--lux-gold);
  border-radius: 50%;
  animation: spin .85s cubic-bezier(.4,0,.2,1) infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--tg-text);
}

/* ── Node detail sheet ─────────────────────── */
#details-panel {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  max-height: 82%;
  display: flex;
  flex-direction: column;
  background: var(--panel-surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  padding: 0;
  box-shadow: 0 -16px 48px rgba(0,0,0,0.18);
  transform: translateY(105%);
  transition: transform .32s cubic-bezier(.32,.72,.24,1);
  z-index: 20;
  color: var(--tg-text);
}
#details-panel.active { transform: translateY(0); }
#detail-handle {
  width: 44px;
  height: 5px;
  border-radius: 3px;
  background: var(--border);
  margin: 9px auto 12px;
  cursor: pointer;
  flex-shrink: 0;
}
#detail-handle:active { background: var(--accent2); }
#detail-header {
  padding: 0 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-shrink: 0;
}
#detail-icon {
  font-size: 22px;
  flex-shrink: 0;
  line-height: 1;
  margin-top: 2px;
}
#detail-title {
  font-size: 16px;
  font-weight: 800;
  line-height: 1.25;
  flex: 1;
}
#detail-group-badge {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
  background: transparent;
  color: var(--lux-gold);
  white-space: nowrap;
  margin-top: 3px;
}
#detail-body { padding: 14px 16px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.detail-section {
  margin-bottom: 14px;
}
.detail-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--tg-hint);
  margin-bottom: 6px;
}
.detail-section-text {
  font-size: 13.5px;
  line-height: 1.5;

</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="header-title">Niche <span>Spider</span></div>
    <span id="header-limits" title="Лимиты на сегодня">3/3</span>
    <div id="header-badge">AI</div>
  </div>

  <!-- Query input -->
  <div id="input-bar">
    <input id="queryInput" type="text" placeholder="Опиши идею бизнеса…" autocomplete="off">
    <button id="buildBtn" type="button">Старт</button>
  </div>

  <!-- Chat -->
  <div id="chat-panel">
    <div id="chat-panel-head">
      <span id="chat-panel-title">Чат с AI</span>
      <span id="chat-free-badge" title="Бесплатные вопросы к AI после опроса">AI 5/5</span>
      <button id="chatToggleBtn" type="button" aria-expanded="true">▼ Свернуть</button>
    </div>
    <div id="chat-log"></div>
    <div id="chat-choice-row">
      <button id="buildGraphChoiceBtn" type="button">Построить граф</button>
      <button id="continueInterviewBtn" type="button">Уточнить дальше</button>
    </div>
    <div id="chat-input-row">
      <textarea id="chatInput" placeholder="Ответь на вопрос AI…" rows="1"></textarea>
      <button id="sendChatBtn" type="button">&#10148;</button>
    </div>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Введи идею и нажми Старт</span>
  </div>

  <!-- Graph -->
  <div id="graph-container">
    <div class="graph-stage">
      <div class="graph-grid" aria-hidden="true"></div>
      <div class="graph-glow graph-glow-a" aria-hidden="true"></div>
      <div class="graph-glow graph-glow-b" aria-hidden="true"></div>
      <div id="mynetwork"></div>
      <div class="graph-vignette" aria-hidden="true"></div>
      <div id="graph-legend" class="graph-legend" aria-hidden="true"></div>
    </div>
    <div id="graph-tools">
      <button id="gtZoomOut" class="gt-btn" type="button" title="Отдалить" aria-label="Отдалить">−</button>
      <span class="gt-divider" aria-hidden="true"></span>
      <button id="gtFit" class="gt-btn" type="button" title="Вписать в экран" aria-label="Вписать">◎</button>
      <span class="gt-divider" aria-hidden="true"></span>
      <button id="gtZoomIn" class="gt-btn" type="button" title="Приблизить" aria-label="Приблизить">+</button>
      <span class="gt-divider" aria-hidden="true"></span>
      <button id="gtSave" class="gt-btn gt-btn-save" type="button" title="Сохранить отчёт в чат" disabled>Сохранить</button>
    </div>
    <div id="fallback-list"></div>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-text">Анализирую…</div>
    </div>

    <!-- Node detail sheet -->
    <div id="details-panel">
      <div id="detail-handle"></div>
      <div id="detail-header">
        <div id="detail-icon">📌</div>
        <div style="flex:1">
          <div id="detail-title"></div>
        </div>
        <div id="detail-group-badge"></div>
      </div>
      <div id="detail-body"></div>
      <div id="detail-actions">
        <button id="askNodeBtn" class="detail-btn" type="button">💬 Уточнить у AI</button>
        <button id="closeBtn" class="detail-btn" type="button">Закрыть</button>

    </div>
  </div>
</div>

<div id="paywall-overlay" role="dialog" aria-modal="true" aria-labelledby="paywall-title">
  <div id="paywall-card">
    <h3 id="paywall-title">Лимит на сегодня</h3>
    <p id="paywall-text"></p>
    <ul class="paywall-features">
      <li>Бесплатно: 3 анализа и 5 уточнений в день</li>
      <li>Подписка снимает лимиты на 30 дней</li>
    </ul>
    <p class="paywall-price"><span id="paywall-price">399</span> ₽/мес</p>
    <button id="paywallSubscribeBtn" type="button">Оплатить</button>
    <button id="paywallCloseBtn" type="button">Позже</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
(function () {
  const BASE_URL = 'https://nichespider.share.zrok.io';
  const CHAT_START_URL = BASE_URL + '/chat/start';
  const CHAT_MSG_URL   = BASE_URL + '/chat/message';
  const CHAT_EXPORT_URL = BASE_URL + '/chat/export';
  const SUBSCRIBE_URL  = BASE_URL + '/user/subscribe';
  const LIMITS_URL     = BASE_URL + '/user/limits';
  const tg = window.Telegram?.WebApp;

  let network = null, nodes = null, edges = null, visReady = false;
  const GRAPH_ZOOM_MIN = 0.35;
  const GRAPH_ZOOM_MAX = 1.65;
  let chatSessionId = null, selectedNode = null, chatCompleted = false;
  let interviewQuestion = 0, interviewMax = 10, interviewAwaitingChoice = false;
  let telegramUserId = null;
  let usageState = {
    subscribed: false,
    analyses_left: 3,
    clarify_left: 5,
    analyses_limit: 3,
    clarify_limit: 5,
    subscription_price_rub: 399,
  };
  let graphNodeMeta = new Map();
  let apiBusyDepth = 0;

  function isApiBusy() { return apiBusyDepth > 0; }

  function setApiBusy(on, text) {
    const overlay = document.getElementById('loading-overlay');
    const app = document.getElementById('app');
    if (on) {
      apiBusyDepth++;
      if (text) {
        const lt = document.getElementById('loading-text');
        if (lt) lt.textContent = text;
      }
      overlay?.classList.add('visible');
      app?.classList.add('api-busy');
    } else {
      apiBusyDepth = Math.max(0, apiBusyDepth - 1);
      if (apiBusyDepth === 0) {
        overlay?.classList.remove('visible');
        app?.classList.remove('api-busy');
      }
    }
  }

  function userFriendlyError(err, context) {
    const msg = String(err?.message || err || '').trim();
    if (/failed to fetch|networkerror|load failed|нет связи/i.test(msg)) {
      return 'Сервис временно недоступен.';
    }
    if (/session not found|сессия не найдена|сессия анализа/i.test(msg)) {
      return 'Сессия анализа завершена. Нажмите «Старт» для нового анализа.';
    }
    if (context === 'graph') return 'Не удалось построить граф.';
    if (context === 'start') return 'Не удалось начать анализ. Попробуйте позже.';
    return 'Не удалось выполнить запрос. Попробуйте позже.';
  }

  function resetChatSession() {
    chatSessionId = null;
    chatCompleted = false;
    interviewQuestion = 0;
    interviewAwaitingChoice = false;
    setInterviewChoiceUI(false);
    setSaveButtonEnabled(false);
    selectedNode = null;
    closeDetails();
  }

  function isClarifyLimitReached() {
    return chatCompleted && !usageState.subscribed && usageState.clarify_left <= 0;
  }

  function showClarifyLimitMessage() {
    expandChatPanel();
    const text =
      'Лимит уточняющих вопросов на сегодня исчерпан. Оформите подписку или вернитесь завтра.';
    appendMsg('ai', text);
    showPaywall(text);
    setStatus('Лимит уточнений на сегодня', 'err');
  }

  function getTelegramUserId() {
    const id = tg?.initDataUnsafe?.user?.id;
    return id ? Number(id) : null;
  }

  function apiBody(body) {
    const out = { ...(body || {}) };
    if (telegramUserId) out.telegram_user_id = telegramUserId;
    return out;
  }

  function applyUsageFromResponse(data) {
    if (!data || typeof data !== 'object') return;
    if (data.subscribed !== undefined) usageState.subscribed = !!data.subscribed;
    if (typeof data.analyses_left === 'number') usageState.analyses_left = data.analyses_left;
    if (typeof data.clarify_left === 'number') usageState.clarify_left = data.clarify_left;
    if (typeof data.analyses_limit === 'number') usageState.analyses_limit = data.analyses_limit;
    if (typeof data.clarify_limit === 'number') usageState.clarify_limit = data.clarify_limit;
    if (typeof data.subscription_price_rub === 'number') {
      usageState.subscription_price_rub = data.subscription_price_rub;
    }
    updateLimitsUI();
    if (chatCompleted) updateProgressBadge();
  }

  function updateLimitsUI() {
    const el = document.getElementById('header-limits');
    const priceEl = document.getElementById('paywall-price');
    const subBtn = document.getElementById('paywallSubscribeBtn');
    if (priceEl) priceEl.textContent = String(usageState.subscription_price_rub || 399);
    if (subBtn) {
      subBtn.textContent = 'Оплатить ' + (usageState.subscription_price_rub || 399) + ' ₽';
    }
    if (!el) return;
    if (usageState.subscribed) {
      el.textContent = 'PRO';
      el.title = 'Подписка PRO активна';
      return;
    }
    el.textContent =
      'анализ ' + usageState.analyses_left + '/' + usageState.analyses_limit;
    el.title =
      'Сегодня: анализов ' + usageState.analyses_left + '/' + usageState.analyses_limit +
      ', уточнений ' + usageState.clarify_left + '/' + usageState.clarify_limit;
  }

  function setSaveButtonEnabled(on) {
    const btn = document.getElementById('gtSave');
    if (btn) btn.disabled = !on;
  }

  function showPaywall(message) {
    const overlay = document.getElementById('paywall-overlay');
    const text = document.getElementById('paywall-text');
    if (text) text.textContent = message || 'Лимит на сегодня исчерпан.';
    if (overlay) overlay.classList.add('visible');
  }

  function hidePaywall() {
    const overlay = document.getElementById('paywall-overlay');
    if (overlay) overlay.classList.remove('visible');
  }

  async function loadUsageLimits() {
    if (!telegramUserId) return;
    try {
      const r = await fetch(LIMITS_URL + '?telegram_user_id=' + telegramUserId);
      if (r.ok) applyUsageFromResponse(await r.json());
    } catch (_) {}
  }

  async function subscribePlan() {
    if (isApiBusy()) return;
    if (!telegramUserId) {
      setStatus('Подписка доступна только из Telegram', 'err');
      return;
    }
    setApiBusy(true, 'Активирую подписку…');
    setStatus('Активирую подписку…', 'busy');
    try {
      const data = await apiPost(SUBSCRIBE_URL, { telegram_user_id: telegramUserId });
      applyUsageFromResponse(data);
      hidePaywall();
      expandChatPanel();
      appendMsg('ai', data.message || 'Подписка активирована. Можно продолжать.');
      setStatus('Подписка активна', 'ok');
      if (tg?.showAlert) tg.showAlert('Подписка активирована на 30 дней');
    } catch (err) {
      setStatus(userFriendlyError(err), 'err');
    } finally {
      setApiBusy(false);
    }
  }

  async function saveReport() {
    if (isApiBusy()) return;
    if (!chatSessionId || !chatCompleted) return;
    if (!telegramUserId) {
      setStatus('Сохранение работает только в Telegram Mini App', 'err');
      return;
    }
    setApiBusy(true, 'Сохраняю…');
    setStatus('Отправляю отчёт в чат…', 'busy');
    try {
      const data = await apiPost(CHAT_EXPORT_URL, {
        session_id: chatSessionId,
        telegram_user_id: telegramUserId,
      });
      setStatus(data.message || 'Отчёт отправлен в чат', 'ok');
      if (tg?.showPopup) {
        tg.showPopup({ title: 'Сохранено', message: data.message || 'Файл в чате Telegram' });
      }
    } catch (err) {
      setStatus(userFriendlyError(err), 'err');
    } finally {
      setApiBusy(false);
    }
  }

  function setInterviewChoiceUI(visible) {
    interviewAwaitingChoice = !!visible;
    const row = document.getElementById('chat-choice-row');
    const inp = document.getElementById('chatInput');
    const send = document.getElementById('sendChatBtn');
    if (!row) return;
    row.classList.toggle('visible', !!visible);
    if (inp) inp.disabled = !!visible;
    if (send) send.disabled = !!visible;
  }

  function applyChatResponse(data) {
    applyUsageFromResponse(data);
    if (data.paywall) {
      resetChatSession();
      showPaywall(data.assistant_message);
      setStatus('Достигнут лимит на сегодня', 'err');
      return;
    }
    chatCompleted = !!data.is_completed;
    if (data.session_id) chatSessionId = data.session_id;
    updateProgressBadge(data.interview_question, data.interview_max);
    setInterviewChoiceUI(!!data.interview_awaiting_choice);
    if (!data.is_completed && !data.interview_awaiting_choice) expandChatPanel();
    renderGraph(data.graph_nodes || [], data.graph_edges || []);
    if (data.is_completed) setInterviewChoiceUI(false);
    setSaveButtonEnabled(!!data.is_completed && !!chatSessionId);
    setStatus(
      data.is_completed
        ? (usageState.subscribed
          ? '✅ Граф готов'
          : ('✅ Граф готов · уточнений: ' + (data.clarify_left ?? usageState.clarify_left)))
        : (data.interview_awaiting_choice
          ? 'Выберите: построить граф или уточнить дальше'
          : ('Опрос (' + (data.interview_question || interviewQuestion) + '/' + (data.interview_max || interviewMax) + ')')),
      'ok'
    );
  }

  function updateProgressBadge(qNum, qMax) {
    if (typeof qNum === 'number') interviewQuestion = qNum;
    if (typeof qMax === 'number') interviewMax = qMax;
    const el = document.getElementById('chat-free-badge');
    if (!el) return;
    if (!chatCompleted) {
      const n = interviewQuestion || 0;
      const m = interviewMax || 10;
      el.textContent = n > 0 ? ('опрос ' + n + '/' + m) : 'опрос';
      el.title = 'Вопросы перед построением графа (до ' + m + ', можно раньше)';
      el.style.opacity = '1';
      return;
    }
    if (usageState.subscribed) {
      el.textContent = 'PRO';
      el.title = 'Подписка активна';
      el.style.opacity = '1';
      return;
    }
    el.textContent = 'AI ' + usageState.clarify_left + '/' + usageState.clarify_limit;
    el.title = 'Уточняющих вопросов сегодня: ' + usageState.clarify_left + ' из ' + usageState.clarify_limit;
    el.style.opacity = usageState.clarify_left === 0 ? '0.55' : '1';
  }

  // ── Status ──────────────────────────────────────────────────────────
  function setStatus(text, state = 'idle') {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('status-dot');
    dot.className = '';
    if (state === 'ok')   dot.classList.add('ok');
    if (state === 'busy') dot.classList.add('busy');
    if (state === 'err')  dot.classList.add('err');
  }

  // ── Chat messages ────────────────────────────────────────────────────
  function appendMsg(role, text, opts = {}) {
    const log = document.getElementById('chat-log');
    const wrap = document.createElement('div');
    wrap.className = 'chat-msg-wrap ' + role;

    const el = document.createElement('div');
    el.className = 'chat-msg ' + role;
    if (role === 'ai') {
      el.innerHTML = '<span class="ai-label">AI</span>' + escHtml(text);
    } else {
      el.textContent = text;
    }
    wrap.appendChild(el);

    const examples = Array.isArray(opts.examples) ? opts.examples.filter(Boolean) : [];
    if (role === 'ai' && examples.length > 0) {
      const tools = document.createElement('div');
      tools.className = 'chat-examples';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'examples-btn';
      btn.textContent = 'Примеры';
      const panel = document.createElement('div');
      panel.className = 'examples-panel hidden';
      panel.setAttribute('aria-hidden', 'true');
      btn.addEventListener('click', () => {
        const hidden = panel.classList.toggle('hidden');
        panel.setAttribute('aria-hidden', hidden ? 'true' : 'false');
        btn.classList.toggle('open', !hidden);
      });
      for (const ex of examples) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'example-chip';
        chip.textContent = ex;
        chip.addEventListener('click', () => {
          const inp = document.getElementById('chatInput');
          inp.value = ex;
          autoGrow(inp);
          inp.focus();
          expandChatPanel();
        });
        panel.appendChild(chip);
      }
      tools.appendChild(btn);
      tools.appendChild(panel);
      wrap.appendChild(tools);
    }

    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Layout ───────────────────────────────────────────────────────────
  function layoutHeights() {
    if (tg) { tg.ready(); tg.expand(); }
    const h = tg?.viewportStableHeight || tg?.viewportHeight || window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
    if (network) setTimeout(() => { network.redraw(); }, 80);
  }

  // ── Auto-grow textarea ───────────────────────────────────────────────
  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  // ── Vis init (luxury graph) ─────────────────────────────────────────
  const LUX_FONT = "-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif";
  const GROUP_ICONS = {
    root:'◆', product:'◇', supplier:'◈', competitor:'◆',
    audience:'◎', channel:'▣', economics:'◉', risk:'!',
    category:'—', plan:'·', warehouse:'▤', clarify:'↳', generic:'·'
  };
  const LUX_DARK = {
    gold: '#D4A574',
    goldMid: '#C9A66B',
    edgeHub: 'rgba(201, 166, 107, 0.32)',
    edgeLeaf: 'rgba(201, 166, 107, 0.08)',
    groups: {
      root:      { fill: '#141008', border: '#D4A574', glow: 'rgba(201,166,107,0.35)', font: '#FFF9E3' },
      product:   { fill: '#12100c', border: '#C9A66B', glow: 'rgba(201,166,107,0.22)', font: '#FFF4E0' },
      supplier:  { fill: '#12100e', border: '#B8956A', glow: 'rgba(184,149,106,0.24)', font: '#FFF0D8' },
      competitor:{ fill: '#120e10', border: '#C9A66B', glow: 'rgba(201,166,107,0.2)', font: '#FFF4E8' },
      audience:  { fill: '#100f12', border: '#D4A574', glow: 'rgba(201,166,107,0.2)', font: '#FFF8EE' },

  const LUX_LIGHT = {

      category:  { fill: '#fff8ee', border: 'rgba(201,166,107,0.55)', glow: 'rgba(201,166,107,0.12)', font: '#6b5340' },
      plan:      { fill: '#ffffff', border: 'rgba(201,166,107,0.35)', glow: 'rgba(0,0,0,0.06)', font: '#1a1408' },
      clarify:   { fill: '#fffdf8', border: '#E8C9A0', glow: 'rgba(232,201,160,0.2)', font: '#1a1408' },
      warehouse: { fill: '#ffffff', border: '#9A7B4F', glow: 'rgba(0,0,0,0.06)', font: '#1a1408' },
      generic:   { fill: '#ffffff', border: 'rgba(201,166,107,0.35)', glow: 'rgba(0,0,0,0.08)', font: '#1a1408' },

  let lastGraphNodes = [];
  let lastGraphEdges = [];

  function isLightTheme() {
    return document.documentElement.getAttribute('data-theme') === 'light';
  }

  function getLux() {
    return isLightTheme() ? LUX_LIGHT : LUX_DARK;
  }

  function luxStyle(group) {
    const LUX = getLux();
    return LUX.groups[group] || LUX.groups.generic;
  }

  function makeGroups() {
    const LUX = getLux();
    const g = {};
    for (const [key, style] of Object.entries(LUX.groups)) {
      g[key] = {
        color: {
          background: style.fill,
          border: style.border,
          highlight: { background: style.fill, border: LUX.gold },
          hover: { background: style.fill, border: LUX.gold }
        },
        borderWidth: key === 'root' ? 2 : 1.5,
        font: {
          color: style.font,
          face: LUX_FONT,
          multi: false
        }
      };
    }
    return g;
  }

  function initVis() {
    if (typeof vis === 'undefined') {
      setStatus('Не удалось отобразить граф', 'err');
      return false;
    }
    const lux = getLux();
    nodes = new vis.DataSet([]);
    edges = new vis.DataSet([]);
    network = new vis.Network(
      document.getElementById('mynetwork'),
      { nodes, edges },
      {
        nodes: {
          shape: 'box',
          margin: { top: 10, right: 14, bottom: 10, left: 14 },
          widthConstraint: { minimum: 72, maximum: 168 },
          heightConstraint: { minimum: 36, valign: 'middle' },

          borderWidth: 1.5,
          borderWidthSelected: 2,
          shapeProperties: { borderRadius: 14 },

            enabled: true,
            size: 10,
            x: 0,
            y: 3,
            color: isLightTheme() ? 'rgba(0,0,0,0.12)' : 'rgba(0,0,0,0.45)'
          }
        },
        edges: {
          width: 1,
          selectionWidth: 1.5,
          hoverWidth: 1.25,
          arrows: { to: { enabled: true, scaleFactor: 0.42, type: 'arrow' } },
          color: {
            color: lux.edgeLeaf,
            highlight: lux.gold,
            hover: 'rgba(201, 166, 107, 0.55)',
            opacity: 0.85
          },
          smooth: {
            enabled: true,
            type: 'cubicBezier',
            forceDirection: 'horizontal',
            roundness: 0.38
          },
          font: { size: 0 }
        },
        groups: makeGroups(),
        layout: {
          improvedLayout: true,
          hierarchical: {
            enabled: true,
            direction: 'LR',
            sortMethod: 'directed',
            shakeTowards: 'roots',
            levelSeparation: 168,
            nodeSpacing: 68,
            treeSpacing: 88,
            blockShifting: true,
            edgeMinimization: true,
            parentCentralization: true
          }
        },
        physics: { enabled: false },
        interaction: {
          dragView: true,
          zoomView: true,
          hover: true,
          tooltipDelay: 120,
          hideEdgesOnDrag: false,
          navigationButtons: false,
          keyboard: false,
          zoomSpeed: 0.55,
          multiselect: false
        },
        configure: { enabled: false }
      }
    );

    network.on('click', ({ nodes: ids }) => {
      collapseChatForGraph();
      if (!ids.length) { closeDetails(); return; }
      const nd = resolveNode(ids[0]);
      if (nd) showDetails(nd);
    });
    network.on('dragStart', collapseChatForGraph);
    network.on('zoom', () => {
      collapseChatForGraph();
      clampGraphZoom();
    });
    network.on('dragEnd', () => { softClampGraphPan(); });
    network.on('hoverNode', () => {
      document.getElementById('mynetwork').style.cursor = 'pointer';
    });
    network.on('blurNode', () => {
      document.getElementById('mynetwork').style.cursor = 'default';
    });

    visReady = true;
    return true;
  }

  // ── Build tree ───────────────────────────────────────────────────────
  const GROUP_LABELS = {
    economics:'Экономика', product:'Товары', competitor:'Конкуренты',
    audience:'Аудитория', channel:'Каналы', supplier:'Поставщики',
    risk:'Риски', warehouse:'Логистика', category:'Разделы', plan:'План'
  };

  function shortenLabel(label, maxLen = 44) {
    let s = String(label || '').trim();
    if (!s) return '—';
    const srcIdx = s.indexOf(' — источник:');
    if (srcIdx > 0) s = s.slice(0, srcIdx).trim();
    const dashIdx = s.search(/\s—\shttps?:\/\//i);
    if (dashIdx > 0) s = s.slice(0, dashIdx).trim();
    s = s.replace(/https?:\/\/\S+/gi, '').replace(/\s+/g, ' ').trim();
    if (s.length > maxLen) s = s.slice(0, maxLen - 1) + '…';
    return s || '—';
  }

  function nodeForVis(node) {
    const label = String(node.label || '');
    const isProgressRoot = node.group === 'root' && /^Опрос/.test(label);
    const isSectionHeader =
      node.group === 'category' ||
      Object.values(GROUP_LABELS).includes(label) ||
      label === 'Ваши ответы';
    const keepFull = isProgressRoot || isSectionHeader;
    return { ...node, label: keepFull ? node.label : shortenLabel(node.label, 38) };
  }

  function enrichNodesForLuxury(rawNodes) {
    const LUX = getLux();
    const shadowBase = isLightTheme() ? 'rgba(0,0,0,0.12)' : null;
    return rawNodes.map((node) => {
      const g = node.group || 'generic';
      const style = luxStyle(g);
      const base = { ...node };
      const isHub = g === 'category' && node.id >= 9e5;
      const isRoot = g === 'root';
      const isPlan = g === 'plan' || node.label === 'Ваши ответы';

      base.color = {
        background: style.fill,
        border: style.border,
        highlight: { background: style.fill, border: LUX.gold },
        hover: { background: style.fill, border: LUX.gold }
      };
      base.shadow = {
        enabled: true,
        size: isRoot ? 22 : (isHub ? 10 : 7),
        x: 0,
        y: isRoot ? 5 : 2,
        color: shadowBase || style.glow
      };
      base.font = {
        face: LUX_FONT,
        color: style.font,
        multi: false,
        vadjust: 0
      };

      if (isRoot) {
        base.shape = 'ellipse';
        base.size = 36;
        base.borderWidth = 2;
        base.font.size = 12;
        base.font.bold = true;
      } else if (isHub) {
        base.shape = 'box';
        base.label = String(base.label).toUpperCase();
        base.borderWidth = 1.5;
        base.widthConstraint = { minimum: 76, maximum: 120 };
        base.heightConstraint = { minimum: 30, valign: 'middle' };
        base.font.size = 9;
        base.font.bold = true;
        base.shapeProperties = { borderRadius: 18 };
      } else if (isPlan) {
        base.shape = 'box';
        base.borderWidth = 1;
        base.widthConstraint = { minimum: 64, maximum: 148 };
        base.font.size = 10;
        base.shapeProperties = { borderRadius: 12 };
      } else if (g === 'risk') {
        base.shape = 'diamond';
        base.size = 22;
        base.borderWidth = 1.5;
        base.font.size = 10;
      } else if (g === 'economics') {
        base.shape = 'box';
        base.borderWidth = 1.5;
        base.widthConstraint = { minimum: 80, maximum: 156 };
        base.font.size = 10;
        base.shapeProperties = { borderRadius: 14 };
      } else {
        base.shape = 'box';
        base.borderWidth = 1.5;
        base.widthConstraint = { minimum: 68, maximum: 152 };
        base.heightConstraint = { minimum: 34, valign: 'middle' };
        base.font.size = 11;
        base.shapeProperties = { borderRadius: 14 };
      }
      return base;
    });
  }

  function enrichEdgesForLuxury(rawEdges, hubIds, rootId) {
    const LUX = getLux();
    const hubs = hubIds || new Set();
    return rawEdges.map((edge) => {
      const touchesHub = hubs.has(edge.from) || hubs.has(edge.to);
      const touchesRoot = edge.from === rootId || edge.to === rootId;
      const isTrunk = touchesHub || touchesRoot;
      return {
        ...edge,
        width: isTrunk ? 1.15 : 0.85,
        color: {
          color: isTrunk ? LUX.edgeHub : LUX.edgeLeaf,
          highlight: LUX.gold,
          hover: 'rgba(201, 166, 107, 0.5)',
          opacity: isTrunk ? 0.9 : 0.65
        },
        smooth: {
          enabled: true,
          type: 'cubicBezier',
          forceDirection: 'horizontal',
          roundness: isTrunk ? 0.32 : 0.42
        }
      };
    });
  }

  function updateGraphLegend(nodeList) {
    const el = document.getElementById('graph-legend');
    if (!el) return;
    const chips = [];
    const seen = new Set();
    for (const n of nodeList) {
      if (n.group !== 'category' || n.id < 9e5) continue;
      const label = String(n.label || '').trim();
      if (!label || seen.has(label)) continue;
      seen.add(label);
      const key = Object.entries(GROUP_LABELS).find(([, v]) => v.toUpperCase() === label)?.[0] || 'category';
      const style = luxStyle(key);
      chips.push(
        `<span class="legend-chip" style="--lc:${style.border}">${escHtml(label)}</span>`
      );
    }
    el.innerHTML = chips.join('');
    el.classList.toggle('visible', chips.length > 0);
    el.setAttribute('aria-hidden', chips.length ? 'false' : 'true');
  }

  function clampGraphZoom() {
    if (!network) return;
    const scale = network.getScale();
    if (scale < GRAPH_ZOOM_MIN) network.moveTo({ scale: GRAPH_ZOOM_MIN, animation: false });
    else if (scale > GRAPH_ZOOM_MAX) network.moveTo({ scale: GRAPH_ZOOM_MAX, animation: false });
  }

  function fitGraphToView(animate = true) {
    if (!network || !nodes) return;
    const ids = nodes.getIds();
    if (!ids.length) return;
    network.fit({
      nodes: ids,
      animation: animate ? { duration: 420, easingFunction: 'easeInOutQuad' } : false,
      minZoomLevel: GRAPH_ZOOM_MIN,
      maxZoomLevel: GRAPH_ZOOM_MAX,
    });
  }

  function softClampGraphPan() {
    if (!network || !nodes) return;
    const ids = nodes.getIds();
    if (!ids.length) return;
    const box = network.getBoundingBox(ids);
    if (!box) return;
    const canvas = network.getScale();
    const view = network.getViewPosition();
    const container = document.getElementById('mynetwork');
    if (!container) return;
    const w = container.clientWidth / canvas;
    const h = container.clientHeight / canvas;
    const pad = 120;
    const cx = (box.left + box.right) / 2;
    const cy = (box.top + box.bottom) / 2;
    const tooFar =
      box.right < view.x - w / 2 + pad ||
      box.left > view.x + w / 2 - pad ||
      box.bottom < view.y - h / 2 + pad ||
      box.top > view.y + h / 2 - pad;
    if (tooFar) fitGraphToView(true);
  }

  function buildTree(rawNodes) {
    const root = rawNodes.find(n => n.group === 'root') || rawNodes[0];
    if (!root) return { nodes: [], edges: [], hubIds: new Set(), rootId: null };

    const treeNodes = [nodeForVis(root)];
    const treeEdges = [];
    const cats = new Map();
    const hubIds = new Set();
    let cid = 9e5;

    for (const node of rawNodes) {
      if (node.id === root.id) continue;
      if (node.group === 'category' || node.group === 'plan') {
        treeNodes.push(nodeForVis(node));
        treeEdges.push({ from: root.id, to: node.id, label: '' });
        if (node.group === 'category') hubIds.add(node.id);
        continue;
      }
      const key = node.group || 'category';
      if (!cats.has(key)) {
        const id = cid++;
        cats.set(key, id);
        hubIds.add(id);
        treeNodes.push({ id, label: GROUP_LABELS[key] || key, group: 'category' });
        treeEdges.push({ from: root.id, to: id, label: '' });
      }
      treeNodes.push(nodeForVis(node));
      treeEdges.push({ from: cats.get(key), to: node.id, label: '' });
    }
    return { nodes: treeNodes, edges: treeEdges, hubIds, rootId: root.id };
  }

  // ── Render graph ─────────────────────────────────────────────────────
  function resolveNode(idOrNode) {
    if (idOrNode == null) return null;
    const id = typeof idOrNode === 'object' ? idOrNode.id : idOrNode;
    return graphNodeMeta.get(id) || nodes.get(id) || null;
  }

  function renderGraph(gNodes, gEdges) {
    if (!gNodes.length) return;
    lastGraphNodes = gNodes;
    lastGraphEdges = gEdges || [];
    graphNodeMeta.clear();
    for (const n of gNodes) graphNodeMeta.set(n.id, n);
    if (!visReady) { showFallback(gNodes, gEdges); return; }
    hideFallback();
    const { nodes: tn, edges: te, hubIds, rootId } = buildTree(gNodes);
    const luxNodes = enrichNodesForLuxury(tn);
    const luxEdges = enrichEdgesForLuxury(te, hubIds, rootId);
    if (network) network.setOptions({ groups: makeGroups() });
    nodes.clear();
    edges.clear();
    nodes.add(luxNodes);
    edges.add(luxEdges);
    updateGraphLegend(luxNodes);
    setTimeout(() => {
      network.redraw();
      fitGraphToView(true);
    }, 120);
  }

  function showFallback(gNodes, gEdges) {
    const box = document.getElementById('fallback-list');
    box.innerHTML = '<h3>Карта ниши</h3>'
      + gNodes.map(n => `<span class="chip ${n.group||''}">${escHtml(n.label)}</span>`).join('');
    box.classList.add('visible');
  }
  function hideFallback() { document.getElementById('fallback-list').classList.remove('visible'); }

  // ── Node details ─────────────────────────────────────────────────────
  function nodeIcon(group) { return GROUP_ICONS[group] || '📌'; }
  function groupName(g) {
    const map = { root:'Проект', product:'Товар', supplier:'Поставщик',
      competitor:'Конкурент', audience:'Аудитория', channel:'Канал',
      economics:'Экономика', risk:'Риск', category:'Раздел', plan:'План',
      warehouse:'Логистика', clarify:'Уточнение' };
    return map[g] || g;
  }

  const GROUP_WHY = {
    economics: 'Экономика показывает, сойдётся ли проект по деньгам: маржа, чек и прибыль.',
    product: 'Товар/услуга — то, что вы тестируете на спрос и сравниваете с конкурентами.',
    competitor: 'Конкуренты задают ценовой коридор и уровень ожиданий клиента.',
    audience: 'Аудитория определяет оффер, каналы и тон коммуникации.',
    channel: 'Канал — где вы покупаете внимание и первые продажи.',
    supplier: 'Поставщик влияет на себестоимость, сроки и риск качества.',
    risk: 'Риски — то, что может «съесть» маржу или сорвать запуск.',
    root: 'Корень проекта: сводка гипотез по нише.',
    plan: 'Параметры из вашего диалога с AI.',
    category: 'Группа связанных блоков на карте.',
  };

  function sourceDomain(url) {
    try {
      return new URL(url).hostname.replace(/^www\./, '');
    } catch (_) {
      return '';
    }
  }

  function showDetails(node) {
    const meta = resolveNode(node.id) || node;
    selectedNode = meta;
    const title = meta.full_label || meta.label || 'Узел';
    const askBtn = document.getElementById('askNodeBtn');

    document.getElementById('detail-icon').textContent = nodeIcon(meta.group);
    document.getElementById('detail-title').textContent = title;

    const c = luxStyle(meta.group);
    const badge = document.getElementById('detail-group-badge');
    badge.textContent = groupName(meta.group);
    if (c) {
      badge.style.background = 'transparent';
      badge.style.border = `1px solid ${c.border}`;
      badge.style.color = c.font;
    }

    if (askBtn) {
      askBtn.disabled = !chatSessionId;
      askBtn.textContent = chatCompleted
        ? '💬 Уточнить у AI'
        : '💬 Уточнить у AI (после опроса)';
    }

    let html = '';
    const detailCopyUrls = [];

    if (GROUP_WHY[meta.group]) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Зачем этот блок</div>
        <div class="detail-tip-box">${escHtml(GROUP_WHY[meta.group])}</div>
      </div>`;
    }

    if (meta.description) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Суть</div>
        <div class="detail-section-text">${escHtml(meta.description)}</div>
      </div>`;
    }

    if (Array.isArray(meta.insights) && meta.insights.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Ключевое</div>
        <ul class="detail-list">${meta.insights.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>
      </div>`;
    }

    if (Array.isArray(meta.tips) && meta.tips.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">На что обратить внимание</div>
        <ul class="detail-list">${meta.tips.map(t => `<li>${escHtml(t)}</li>`).join('')}</ul>
      </div>`;
    }

    if (Array.isArray(meta.actions) && meta.actions.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Пошагово</div>
        <ol class="detail-list">${meta.actions.map(a => `<li>${escHtml(a)}</li>`).join('')}</ol>
      </div>`;
    }

    if (Array.isArray(meta.sources) && meta.sources.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Источники из поиска</div>`;
      for (const s of meta.sources) {
        const url = s?.url || '';
        const titleSrc = _shortSourceTitle(s?.title || 'Источник');
        const passages = Array.isArray(s?.passages) ? s.passages.filter(Boolean) : [];
        const domain = sourceDomain(url);
        const safeUrl = escHtml(url);
        let copyBtn = '';
        if (url) {
          const copyIdx = detailCopyUrls.length;
          detailCopyUrls.push(url);
          copyBtn = `<button type="button" class="detail-btn copy-src-btn" data-copy-idx="${copyIdx}" style="width:auto;padding:8px 10px;font-size:12px;background:rgba(201,166,107,0.12);color:var(--lux-gold);border:1px solid rgba(201,166,107,0.28);border-radius:10px;">Копировать</button>`;
        }
        html += `<div class="detail-source-card">
          <div style="display:flex;gap:8px;align-items:flex-start;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:14px;">${escHtml(titleSrc)}</div>
              ${domain ? `<div class="detail-source-domain">${escHtml(domain)}</div>` : ''}
            </div>
            ${copyBtn}
          </div>`;
        for (const p of passages.slice(0, 2)) {
          html += `<div style="margin-top:8px;font-size:13px;line-height:1.45;color:var(--tg-text);">${escHtml(p)}</div>`;
        }
        if (url) {
          html += `<a class="detail-source-link" href="${safeUrl}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;font-size:13px;">
            Открыть источник <span class="link-arrow">↗</span>
          </a>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }

    document.getElementById('detail-body').innerHTML = html || '<div style="color:var(--muted);font-size:13px;">Нажми «Уточнить у AI» — разберём блок в чате.</div>';
    document.getElementById('details-panel').classList.add('active');

    document.querySelectorAll('.copy-src-btn').forEach(btn => {
      const url = detailCopyUrls[Number(btn.getAttribute('data-copy-idx'))];
      if (url) btn.onclick = () => window.__copyLink(url);
    });
  }

  function _shortSourceTitle(title) {
    let s = String(title || '').trim();
    if (s.startsWith('http')) {
      const d = sourceDomain(s);
      return d || 'Источник';
    }
    return shortenLabel(s, 56);
  }

  function closeDetails() {
    selectedNode = null;
    document.getElementById('details-panel').classList.remove('active');
  }

  function setChatCollapsed(collapsed) {
    const panel = document.getElementById('chat-panel');
    const btn = document.getElementById('chatToggleBtn');
    panel.classList.toggle('collapsed', collapsed);
    btn.textContent = collapsed ? '▲ Развернуть чат' : '▼ Свернуть';
    btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    if (network) setTimeout(() => network.redraw(), 60);
  }

  function expandChatPanel() { setChatCollapsed(false); }

  function toggleChatPanel() {
    const collapsed = document.getElementById('chat-panel').classList.contains('collapsed');
    setChatCollapsed(!collapsed);
  }

  // Автоскрытие верхнего чата, когда пользователь работает с графом.
  function collapseChatForGraph() {
    const panel = document.getElementById('chat-panel');
    if (!panel.classList.contains('collapsed')) setChatCollapsed(true);
  }

  async function sendInterviewChoice(kind) {
    if (isApiBusy()) return;
    if (!chatSessionId) return;
    const msg = kind === 'build' ? 'Построить граф' : 'Уточнить дальше';
    expandChatPanel();
    appendMsg('user', msg);
    setInterviewChoiceUI(false);
    const busyText = kind === 'build' ? 'Строю граф…' : 'Готовлю вопрос…';
    setApiBusy(true, busyText);
    setStatus('AI думает…', 'busy');
    try {
      const data = await apiPost(CHAT_MSG_URL, apiBody({ session_id: chatSessionId, message: msg }));
      appendMsg('ai', data.assistant_message, {
        examples: data.is_completed ? [] : (data.answer_examples || []),
      });
      applyChatResponse(data);
    } catch (err) {
      const text = userFriendlyError(err, kind === 'build' ? 'graph' : 'message');
      setStatus(text, 'err');
      appendMsg('ai', text);
      setInterviewChoiceUI(true);
    } finally {
      setApiBusy(false);
    }
  }

  async function sendMsgText(msg, nodeId) {
    if (isApiBusy()) return;
    if (!msg || !chatSessionId) return;
    setApiBusy(true, 'Готовлю ответ…');
    setStatus('AI думает…', 'busy');
    try {
      const payload = { session_id: chatSessionId, message: msg };
      if (nodeId != null) payload.node_id = nodeId;
      const data = await apiPost(CHAT_MSG_URL, apiBody(payload));
      appendMsg('ai', data.assistant_message, {
        examples: data.is_completed ? [] : (data.answer_examples || []),
      });
      applyChatResponse(data);
    } catch (err) {
      const text = userFriendlyError(err);
      setStatus(text, 'err');
      appendMsg('ai', text);
    } finally {
      setApiBusy(false);
    }
  }

  async function askAboutNode() {
    if (isApiBusy()) return;
    const meta = selectedNode && resolveNode(selectedNode.id);
    if (!meta) return;
    if (!chatSessionId) {
      expandChatPanel();
      appendMsg('ai', 'Сначала нажми «Старт» и опиши идею бизнеса.');
      return;
    }
    if (isClarifyLimitReached()) {
      showClarifyLimitMessage();
      return;
    }
    const title = meta.full_label || meta.label || 'блок';
    const question = `По блоку «${title}» (${groupName(meta.group)}): что важно учесть и какие конкретные шаги сделать?`;
    closeDetails();
    expandChatPanel();
    appendMsg('user', question);
    await sendMsgText(question, meta.id);
  }

  // ── API helpers ───────────────────────────────────────────────────────
  function formatApiError(status) {
    if (status >= 500 || status === 502 || status === 503) {
      return 'Сервис временно недоступен.';
    }
    return 'Не удалось выполнить запрос. Попробуйте позже.';
  }

  async function apiPost(url, body, retries = 1) {
    let lastErr;
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const text = await r.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch (_) { data = {}; }
        if (!r.ok) {
          const detail = typeof data.detail === 'string' ? data.detail : '';
          const technical = /traceback|\.py:|internal server|chat start failed|chat message failed/i.test(detail);
          throw new Error(technical || !detail ? formatApiError(r.status) : detail);
        }
        return data;
      } catch (err) {
        lastErr = err;
        const msg = String(err.message || err);
        const isNetwork = /failed to fetch|networkerror|load failed/i.test(msg);
        if (!isNetwork || attempt >= retries) break;
        await new Promise((r) => setTimeout(r, 800));
      }
    }
    const msg = String(lastErr?.message || lastErr || '');
    if (/failed to fetch|networkerror|load failed/i.test(msg)) {
      throw new Error('Сервис временно недоступен.');
    }
    throw new Error(msg || 'Не удалось выполнить запрос. Попробуйте позже.');
  }

  async function pingApi() {
    try {
      const r = await fetch(BASE_URL + '/', { method: 'GET' });
      if (r.ok) {
        setStatus('Готов к работе', 'ok');
        return true;
      }
      setStatus('Сервис временно недоступен', 'err');
      return false;
    } catch (_) {
      setStatus('Сервис временно недоступен', 'err');
      return false;
    }
  }

  // ── Start chat ────────────────────────────────────────────────────────
  async function startChat() {
    if (isApiBusy()) return;
    const query = document.getElementById('queryInput').value.trim();
    if (!query) { document.getElementById('queryInput').focus(); return; }

    resetChatSession();
    setApiBusy(true, 'Запускаю анализ…');
    setStatus('Запрос к AI…', 'busy');
    document.getElementById('chat-log').innerHTML = '';
    setInterviewChoiceUI(false);
    appendMsg('user', query);
    closeDetails();

    try {
      const data = await apiPost(CHAT_START_URL, apiBody({ query }));
      if (data.paywall) {
        appendMsg('ai', data.assistant_message);
        applyChatResponse(data);
        return;
      }
      appendMsg('ai', data.assistant_message, {
        examples: data.is_completed ? [] : (data.answer_examples || []),
      });
      applyChatResponse(data);
    } catch (err) {
      const text = userFriendlyError(err, 'start');
      setStatus(text, 'err');
      appendMsg('ai', text);
    } finally {
      setApiBusy(false);
    }
  }

  // ── Send message ──────────────────────────────────────────────────────
  async function sendMsg() {
    if (isApiBusy()) return;
    const inp = document.getElementById('chatInput');
    const msg = inp.value.trim();
    if (!msg) return;
    if (!chatSessionId) { appendMsg('ai', 'Сначала нажми Старт и опиши свою идею.'); return; }
    if (interviewAwaitingChoice) {
      appendMsg('ai', 'Сначала выбери: «Построить граф» или «Уточнить дальше».');
      return;
    }
    if (isClarifyLimitReached()) {
      showClarifyLimitMessage();
      return;
    }

    expandChatPanel();
    appendMsg('user', msg);
    inp.value = '';
    autoGrow(inp);
    await sendMsgText(msg);
  }

  function refreshGraphTheme() {
    if (lastGraphNodes.length) renderGraph(lastGraphNodes, lastGraphEdges);
  }

  function applyTheme() {
    const light = tg?.colorScheme === 'light';
    const theme = light ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    if (tg) {
      try {
        const bg = light ? '#f5f0eb' : '#0a0a0a';
        tg.setHeaderColor(bg);
        tg.setBackgroundColor(bg);
        if (typeof tg.setBottomBarColor === 'function') tg.setBottomBarColor(bg);
      } catch (_) {}
    }
    refreshGraphTheme();
    if (network) setTimeout(() => network.redraw(), 80);
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  function boot() {
    layoutHeights();
    initVis();
    telegramUserId = getTelegramUserId();
    if (tg) {
      tg.ready();
      tg.expand();
      applyTheme();
      tg.onEvent('themeChanged', applyTheme);
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    updateLimitsUI();
    loadUsageLimits();

    document.getElementById('buildBtn').addEventListener('click', startChat);
    document.getElementById('gtSave').addEventListener('click', saveReport);
    document.getElementById('paywallSubscribeBtn').addEventListener('click', subscribePlan);
    document.getElementById('paywallCloseBtn').addEventListener('click', hidePaywall);
    document.getElementById('buildGraphChoiceBtn').addEventListener('click', () => sendInterviewChoice('build'));
    document.getElementById('continueInterviewBtn').addEventListener('click', () => sendInterviewChoice('continue'));
    document.getElementById('sendChatBtn').addEventListener('click', sendMsg);
    document.getElementById('closeBtn').addEventListener('click', closeDetails);
    document.getElementById('askNodeBtn').addEventListener('click', () => { askAboutNode(); });
    document.getElementById('chatToggleBtn').addEventListener('click', toggleChatPanel);
    document.getElementById('detail-handle').addEventListener('click', closeDetails);

    const zoomBy = (factor) => {
      if (!network) return;
      const s = Math.min(GRAPH_ZOOM_MAX, Math.max(GRAPH_ZOOM_MIN, network.getScale() * factor));
      network.moveTo({ scale: s, animation: { duration: 200 } });
    };
    document.getElementById('gtZoomIn').addEventListener('click', () => zoomBy(1.3));
    document.getElementById('gtZoomOut').addEventListener('click', () => zoomBy(0.77));
    document.getElementById('gtFit').addEventListener('click', () => fitGraphToView(true));

    const ci = document.getElementById('chatInput');
    ci.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
    ci.addEventListener('input', () => autoGrow(ci));

    if (tg) tg.onEvent('viewportChanged', layoutHeights);
    window.addEventListener('resize', layoutHeights);

    const params = new URLSearchParams(location.search);
    let q = params.get('query') || '';
    const autostart = params.get('autostart') === '1';

    // Параметр из t.me-ссылки (?startapp=...)
    const startParam = tg?.initDataUnsafe?.start_param;
    if (!q && startParam) {
      try { q = decodeURIComponent(startParam); } catch (_) { q = startParam; }
    }

    const input = document.getElementById('queryInput');
    input.value = q;

    updateProgressBadge();

    pingApi().then((ok) => {
      if (q && autostart && ok) {
        setStatus('Запускаю анализ…', 'busy');
        setTimeout(() => startChat(), 400);
      } else if (q && autostart && !ok) {
        setStatus('Сервис временно недоступен', 'err');
      } else if (q) {
        setStatus(ok ? 'Идея подставлена — нажми Старт' : 'Сервис временно недоступен', ok ? 'ok' : 'err');
      } else if (!ok) {
        setStatus('Сервис временно недоступен', 'err');
      }
    });
  }

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', boot)
    : boot();
})();

// global helper for copy buttons inside HTML
window.__copyLink = async function (url) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(url);
    } else {
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    try {
      window.Telegram?.WebApp?.showPopup?.({ title: 'Скопировано', message: 'Ссылка скопирована в буфер обмена.', buttons: [{ type: 'ok' }] });
    } catch (_) {}
  } catch (e) {
    alert('Не удалось скопировать ссылку: ' + (e?.message || e));
  }
};
</script>

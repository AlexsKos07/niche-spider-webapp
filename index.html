<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niche Spider: Business Map</title>
    <link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/styles/vis-network.min.css" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #111111);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --graph-height: 400px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100%;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: var(--app-height, 100vh);
            max-height: var(--app-height, 100vh);
        }

        #controls {
            flex: 0 0 auto;
            padding: 12px;
            display: flex;
            gap: 8px;
            background: var(--secondary-bg);
            border-bottom: 1px solid #ccc;
        }

        #queryInput {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #aaa;
            font-size: 16px;
            background: #fff;
            color: #000;
        }

        #buildBtn {
            flex: 0 0 auto;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: var(--button-color);
            color: var(--button-text-color);
            font-weight: 700;
            font-size: 15px;
        }

        #status-bar {
            flex: 0 0 auto;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            background: #fff3cd;
            color: #5c4a00;
            border-bottom: 1px solid #e0c35a;
        }

        #graph-container {
            flex: 0 0 auto;
            height: var(--graph-height);
            position: relative;
            background: #dbeafe;
            border-top: 2px solid #2563eb;
            overflow: hidden;
        }

        #mynetwork {
            width: 100%;
            height: 100%;
        }

        #fallback-list {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            padding: 12px;
            background: rgba(255, 255, 255, 0.92);
            display: none;
        }

        #fallback-list.visible { display: block; }

        #fallback-list h3 {
            margin: 0 0 8px;
            font-size: 15px;
        }

        .chip {
            display: inline-block;
            margin: 4px 6px 4px 0;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            color: #111;
            background: #e5e7eb;
        }

        .chip.root { background: #fecaca; }
        .chip.product { background: #bbf7d0; }
        .chip.supplier { background: #fde68a; }
        .chip.warehouse { background: #bae6fd; }
        .chip.competitor { background: #f9a8d4; }

        #loading-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
            z-index: 30;
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        #loading-overlay.visible { display: flex; }

        #details-panel {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            max-height: 45%;
            overflow-y: auto;
            padding: 16px;
            background: #fff;
            color: #111;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(110%);
            transition: transform 0.25s ease;
            z-index: 20;
        }

        #details-panel.active { transform: translateY(0); }

        #closeBtn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #e5e7eb;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div id="app">
    <div id="controls">
        <input type="text" id="queryInput" placeholder="Ниша (напр. Кофейня)">
        <button id="buildBtn" type="button">Построить</button>
    </div>
    <div id="status-bar">Загрузка...</div>

    <div id="graph-container">
        <div id="mynetwork"></div>
        <div id="fallback-list"></div>
        <div id="loading-overlay">🕷️ Анализирую...</div>
        <div id="details-panel">
            <div id="detail-title" style="font-weight:800;font-size:18px;margin-bottom:8px;"></div>
            <div id="detail-content"></div>
            <button id="closeBtn" type="button">Закрыть</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
(function () {
    const API_URL = 'https://a57ftj5o31b8.shares.zrok.io/analyze';
    const tg = window.Telegram?.WebApp;

    let network = null;
    let nodes = null;
    let edges = null;
    let visReady = false;

    function setStatus(text) {
        document.getElementById('status-bar').textContent = text;
    }

    function layoutHeights() {
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const appHeight = tg?.viewportStableHeight || tg?.viewportHeight || window.innerHeight;
        const controlsH = document.getElementById('controls').offsetHeight;
        const statusH = document.getElementById('status-bar').offsetHeight;
        const graphH = Math.max(220, appHeight - controlsH - statusH);

        document.documentElement.style.setProperty('--app-height', appHeight + 'px');
        document.documentElement.style.setProperty('--graph-height', graphH + 'px');
    }

    function initVis() {
        if (typeof vis === 'undefined') {
            setStatus('vis-network не загрузился — показываю список узлов');
            return false;
        }

        nodes = new vis.DataSet([]);
        edges = new vis.DataSet([]);
        const container = document.getElementById('mynetwork');

        network = new vis.Network(
            container,
            { nodes, edges },
            {
                nodes: {
                    shape: 'dot',
                    size: 22,
                    font: { size: 14, color: '#000' },
                    borderWidth: 2
                },
                edges: {
                    width: 2,
                    arrows: 'to',
                    color: { color: '#555' },
                    smooth: {
                        enabled: true,
                        type: "cubicBezier",
                        forceDirection: "vertical",
                        roundness: 0.35
                    }
                },
                groups: {
                    root: { color: { background: '#ef4444', border: '#b91c1c' }, size: 30 },
                    product: { color: { background: '#22c55e', border: '#15803d' } },
                    supplier: { color: { background: '#eab308', border: '#a16207' }, shape: 'square' },
                    warehouse: { color: { background: '#38bdf8', border: '#0369a1' }, shape: 'database' },
                    competitor: { color: { background: '#ec4899', border: '#be185d' }, shape: 'triangle' },
                    audience: { color: { background: '#a78bfa', border: '#6d28d9' } },
                    channel: { color: { background: '#60a5fa', border: '#1d4ed8' } },
                    economics: { color: { background: '#34d399', border: '#047857' }, shape: 'box' },
                    risk: { color: { background: '#fca5a5', border: '#b91c1c' }, shape: 'diamond' },
                    category: { color: { background: '#d1d5db', border: '#6b7280' }, shape: 'box' }
                },
                layout: {
                    hierarchical: {
                        enabled: true,
                        direction: "UD",
                        sortMethod: "directed",
                        levelSeparation: 140,
                        nodeSpacing: 180,
                        treeSpacing: 220,
                        blockShifting: true,
                        edgeMinimization: true,
                        parentCentralization: true
                    }
                },
                physics: {
                    enabled: false
                }
            }
        );

        network.on('click', function (params) {
            if (!params.nodes.length) {
                closeDetails();
                return;
            }
            const nodeData = nodes.get(params.nodes[0]);
            if (nodeData) showDetails(nodeData);
        });

        visReady = true;
        return true;
    }

    function showFallback(graphNodes, graphEdges) {
        const box = document.getElementById('fallback-list');
        const lines = graphEdges.map((e) => {
            const from = graphNodes.find((n) => n.id === e.from)?.label || e.from;
            const to = graphNodes.find((n) => n.id === e.to)?.label || e.to;
            return `<div style="font-size:12px;color:#444;margin:2px 0;">${from} → ${to}</div>`;
        }).join('');

        const chips = graphNodes.map((n) =>
            `<span class="chip ${n.group || ''}">${n.label}</span>`
        ).join('');

        box.innerHTML = `<h3>Карта ниши (список)</h3>${chips}${lines ? '<hr>' + lines : ''}`;
        box.classList.add('visible');
    }

    function hideFallback() {
        document.getElementById('fallback-list').classList.remove('visible');
    }

    function buildTreeGraph(graphNodes) {
        const groupLabels = {
            economics: "Экономика",
            product: "Товары",
            competitor: "Конкуренты",
            audience: "Целевая аудитория",
            channel: "Реклама и каналы",
            supplier: "Поставщики",
            risk: "Риски",
            warehouse: "Логистика",
            category: "Категория"
        };

        const root = graphNodes.find((n) => n.group === "root") || graphNodes[0];
        if (!root) return { nodes: [], edges: [] };

        const treeNodes = [{ ...root }];
        const treeEdges = [];

        const categories = new Map();
        const others = graphNodes.filter((n) => n.id !== root.id);
        let categoryId = 100000;

        for (const node of others) {
            const key = node.group || "category";
            if (!categories.has(key)) {
                const cid = categoryId++;
                categories.set(key, cid);
                treeNodes.push({
                    id: cid,
                    label: groupLabels[key] || key,
                    group: "category"
                });
                treeEdges.push({
                    from: root.id,
                    to: cid,
                    label: "раздел"
                });
            }

            treeNodes.push(node);
            treeEdges.push({
                from: categories.get(key),
                to: node.id,
                label: "элемент"
            });
        }

        return { nodes: treeNodes, edges: treeEdges };
    }

    function showDetails(node) {
        document.getElementById('detail-title').textContent = node.label || 'Узел';
        const groupLabel = node.group || "—";
        const description = node.description ? `<div style="margin:8px 0 10px;"><b>Что это:</b> ${node.description}</div>` : "";

        const insights = Array.isArray(node.insights) && node.insights.length
            ? `<div style="margin:8px 0;"><b>Ключевые выводы:</b><ul style="margin:6px 0 0 16px;">${node.insights.map((x) => `<li>${x}</li>`).join("")}</ul></div>`
            : "";

        const actions = Array.isArray(node.actions) && node.actions.length
            ? `<div style="margin:8px 0;"><b>Что делать:</b><ol style="margin:6px 0 0 18px;">${node.actions.map((x) => `<li>${x}</li>`).join("")}</ol></div>`
            : "";

        const sources = Array.isArray(node.sources) && node.sources.length
            ? `<div style="margin:8px 0;"><b>Источники/поставщики:</b><ul style="margin:6px 0 0 16px;">${node.sources.map((s) => {
                const title = s?.title || "Ссылка";
                const url = s?.url || "#";
                return `<li><a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a></li>`;
            }).join("")}</ul></div>`
            : "";

        document.getElementById('detail-content').innerHTML = `
            <div><b>Группа:</b> ${groupLabel}</div>
            ${description}
            ${insights}
            ${actions}
            ${sources}
        `;
        document.getElementById('details-panel').classList.add('active');
    }

    function closeDetails() {
        document.getElementById('details-panel').classList.remove('active');
    }

    async function loadGraph() {
        const query = document.getElementById('queryInput').value.trim();
        if (!query) {
            alert('Введите нишу');
            return;
        }

        const loading = document.getElementById('loading-overlay');
        loading.classList.add('visible');
        setStatus('Запрос к API...');
        closeDetails();

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });

            const raw = await response.text();
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${raw}`);
            }

            const data = JSON.parse(raw);
            const graphNodes = data.graph_nodes || [];
            const graphEdges = data.graph_edges || [];

            if (!graphNodes.length) {
                throw new Error('API вернул пустой граф');
            }

            showFallback(graphNodes, graphEdges);

            if (visReady && network && nodes && edges) {
                hideFallback();
                const treeGraph = buildTreeGraph(graphNodes);
                nodes.clear();
                edges.clear();
                nodes.add(treeGraph.nodes);
                edges.add(treeGraph.edges);
                layoutHeights();
                setTimeout(() => {
                    network.redraw();
                    network.fit({ animation: { duration: 500 } });
                }, 120);
            }

            setStatus(`Готово: ${graphNodes.length} узлов, ${graphEdges.length} связей`);
        } catch (err) {
            console.error(err);
            setStatus('Ошибка: ' + err.message);
            alert('Ошибка: ' + err.message);
        } finally {
            loading.classList.remove('visible');
        }
    }

    function boot() {
        layoutHeights();
        initVis();

        document.getElementById('buildBtn').addEventListener('click', loadGraph);
        document.getElementById('closeBtn').addEventListener('click', closeDetails);

        if (tg) {
            tg.onEvent('viewportChanged', layoutHeights);
        }
        window.addEventListener('resize', layoutHeights);

        const initialQuery = new URLSearchParams(window.location.search).get('query');
        document.getElementById('queryInput').value = initialQuery || 'Кофейня';

        loadGraph();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
    } else {
        boot();
    }
})();
</script>
</body>
</html>

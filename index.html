<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Niche Spider</title>
<link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/styles/vis-network.min.css" rel="stylesheet" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --tg-bg:       var(--tg-theme-bg-color,          #0f172a);
  --tg-text:     var(--tg-theme-text-color,         #f1f5f9);
  --tg-btn:      var(--tg-theme-button-color,       #6366f1);
  --tg-btn-text: var(--tg-theme-button-text-color,  #ffffff);
  --tg-hint:     var(--tg-theme-hint-color,         #94a3b8);
  --tg-secondary:var(--tg-theme-secondary-bg-color, #1e293b);
  --tg-link:     var(--tg-theme-link-color,         #818cf8);
  --card:        #1e293b;
  --border:      #334155;
  --radius:      14px;
  --accent:      #6366f1;
  --accent2:     #818cf8;
  --danger:      #ef4444;
  --success:     #22c55e;
  --warn:        #f59e0b;
  --muted:       #475569;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-bg);
  color: var(--tg-text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Layout ────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: var(--app-height, 100dvh);
}

/* ── Header ────────────────────────────────── */
#header {
  flex: 0 0 auto;
  padding: 10px 14px 8px;
  background: var(--tg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
#header-logo {
  font-size: 18px;
  line-height: 1;
}
#header-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--tg-text);
  flex: 1;
  letter-spacing: -0.02em;
}
#header-title span {
  color: var(--accent2);
}
#header-badge {
  font-size: 10px;
  font-weight: 700;
  background: var(--accent);
  color: #fff;
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.04em;
}

/* ── Input bar ─────────────────────────────── */
#input-bar {
  flex: 0 0 auto;
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--tg-secondary);
  border-bottom: 1px solid var(--border);
}
#queryInput {
  flex: 1;
  padding: 10px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--tg-bg);
  color: var(--tg-text);
  font-size: 15px;
  outline: none;
  transition: border-color .15s;
}
#queryInput:focus { border-color: var(--accent); }
#queryInput::placeholder { color: var(--muted); }
#buildBtn {
  flex: 0 0 auto;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: background .15s, transform .1s;
  white-space: nowrap;
}
#buildBtn:active { background: #4f46e5; transform: scale(.97); }

/* ── Chat panel ────────────────────────────── */
#chat-panel {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 8px 12px 10px;
  background: var(--tg-secondary);
  border-bottom: 1px solid var(--border);
  max-height: 38vh;
}
#chat-log {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 28vh;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#chat-log::-webkit-scrollbar { width: 4px; }
#chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chat-msg {
  max-width: 88%;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start;
  background: var(--card);
  color: var(--tg-text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-msg.ai .ai-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 4px;
  display: block;
}

#chat-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
#chatInput {
  flex: 1;
  padding: 9px 13px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--tg-bg);
  color: var(--tg-text);
  font-size: 14px;
  outline: none;
  resize: none;
  transition: border-color .15s;
  min-height: 38px;
  max-height: 80px;
}
#chatInput:focus { border-color: var(--accent); }
#chatInput::placeholder { color: var(--muted); }
#sendChatBtn {
  flex: 0 0 auto;
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s;
}
#sendChatBtn:active { background: #4f46e5; transform: scale(.93); }

/* ── Status bar ────────────────────────────── */
#status-bar {
  flex: 0 0 auto;
  padding: 5px 14px;
  font-size: 11.5px;
  color: var(--tg-hint);
  background: var(--tg-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  min-height: 26px;
}
#status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background .2s;
}
#status-dot.ok   { background: var(--success); }
#status-dot.busy { background: var(--warn); animation: pulse 1s infinite; }
#status-dot.err  { background: var(--danger); }
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .4; }
}

/* ── Graph area ────────────────────────────── */
#graph-container {
  flex: 1 1 0;
  position: relative;
  background: var(--tg-bg);
  min-height: 0;
  overflow: hidden;
}
#mynetwork { width: 100%; height: 100%; }

/* ── Fallback list ─────────────────────────── */
#fallback-list {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 14px;
  background: var(--tg-bg);
  display: none;
}
#fallback-list.visible { display: block; }
#fallback-list h3 { font-size: 14px; color: var(--tg-hint); margin-bottom: 10px; }
.chip {
  display: inline-block;
  margin: 3px 5px 3px 0;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  color: #111;
}
.chip.root       { background: #fca5a5; }
.chip.product    { background: #86efac; }
.chip.supplier   { background: #fde68a; }
.chip.competitor { background: #f0abfc; }
.chip.audience   { background: #c4b5fd; }
.chip.channel    { background: #93c5fd; }
.chip.economics  { background: #6ee7b7; }
.chip.risk       { background: #fca5a5; }
.chip.category   { background: #cbd5e1; }
.chip.plan       { background: #a5f3fc; }

/* ── Loading overlay ───────────────────────── */
#loading-overlay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: rgba(15,23,42,.82);
  backdrop-filter: blur(4px);
  z-index: 30;
}
#loading-overlay.visible { display: flex; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--tg-text);
}

/* ── Node detail sheet ─────────────────────── */
#details-panel {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  max-height: 60%;
  overflow-y: auto;
  background: var(--card);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 0 0 12px;
  box-shadow: 0 -8px 32px rgba(0,0,0,.4);
  transform: translateY(105%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  z-index: 20;
  color: var(--tg-text);
}
#details-panel.active { transform: translateY(0); }
#detail-handle {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  margin: 10px auto 14px;
}
#detail-header {
  padding: 0 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
#detail-icon {
  font-size: 22px;
  flex-shrink: 0;
  line-height: 1;
  margin-top: 2px;
}
#detail-title {
  font-size: 16px;
  font-weight: 800;
  line-height: 1.25;
  flex: 1;
}
#detail-group-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  white-space: nowrap;
  margin-top: 3px;
}
#detail-body { padding: 14px 16px; }
.detail-section {
  margin-bottom: 14px;
}
.detail-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--tg-hint);
  margin-bottom: 6px;
}
.detail-section-text {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--tg-text);
}
.detail-list { padding-left: 16px; font-size: 13px; line-height: 1.7; }
.detail-list li { margin-bottom: 2px; }
.detail-source-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--tg-bg);
  text-decoration: none;
  color: var(--tg-link);
  font-size: 13px;
  font-weight: 600;
}
.detail-source-link:active { opacity: .75; }
.link-arrow { font-size: 14px; margin-left: auto; color: var(--muted); }
#detail-actions {
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.detail-btn {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.detail-btn:active { opacity: .8; transform: scale(.98); }
#askNodeBtn  { background: rgba(99,102,241,.18); color: var(--accent2); }
#closeBtn    { background: var(--border); color: var(--tg-text); }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="header-logo">🕷️</div>
    <div id="header-title">Niche <span>Spider</span></div>
    <div id="header-badge">AI</div>
  </div>

  <!-- Query input -->
  <div id="input-bar">
    <input id="queryInput" type="text" placeholder="Опиши идею бизнеса…" autocomplete="off">
    <button id="buildBtn" type="button">Старт</button>
  </div>

  <!-- Chat -->
  <div id="chat-panel">
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <textarea id="chatInput" placeholder="Ответь на вопрос AI…" rows="1"></textarea>
      <button id="sendChatBtn" type="button">&#10148;</button>
    </div>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Введи идею и нажми Старт</span>
  </div>

  <!-- Graph -->
  <div id="graph-container">
    <div id="mynetwork"></div>
    <div id="fallback-list"></div>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-text">Анализирую…</div>
    </div>

    <!-- Node detail sheet -->
    <div id="details-panel">
      <div id="detail-handle"></div>
      <div id="detail-header">
        <div id="detail-icon">📌</div>
        <div style="flex:1">
          <div id="detail-title"></div>
        </div>
        <div id="detail-group-badge"></div>
      </div>
      <div id="detail-body"></div>
      <div id="detail-actions">
        <button id="askNodeBtn" class="detail-btn" type="button">💬 Уточнить у AI</button>
        <button id="closeBtn" class="detail-btn" type="button">Закрыть</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
(function () {
  const BASE_URL = 'https://zyh7nq3jp4r1.share.zrok.io';
  const API_URL        = BASE_URL + '/analyze';
  const CHAT_START_URL = BASE_URL + '/chat/start';
  const CHAT_MSG_URL   = BASE_URL + '/chat/message';
  const tg = window.Telegram?.WebApp;

  let network = null, nodes = null, edges = null, visReady = false;
  let chatSessionId = null, selectedNode = null;

  // ── Status ──────────────────────────────────────────────────────────
  function setStatus(text, state = 'idle') {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('status-dot');
    dot.className = '';
    if (state === 'ok')   dot.classList.add('ok');
    if (state === 'busy') dot.classList.add('busy');
    if (state === 'err')  dot.classList.add('err');
  }

  // ── Chat messages ────────────────────────────────────────────────────
  function appendMsg(role, text) {
    const log = document.getElementById('chat-log');
    const el = document.createElement('div');
    el.className = 'chat-msg ' + role;
    if (role === 'ai') {
      el.innerHTML = '<span class="ai-label">🤖 AI</span>' + escHtml(text);
    } else {
      el.textContent = text;
    }
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Layout ───────────────────────────────────────────────────────────
  function layoutHeights() {
    if (tg) { tg.ready(); tg.expand(); }
    const h = tg?.viewportStableHeight || tg?.viewportHeight || window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
    if (network) setTimeout(() => { network.redraw(); }, 80);
  }

  // ── Auto-grow textarea ───────────────────────────────────────────────
  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  // ── Vis init ─────────────────────────────────────────────────────────
  const GROUP_ICONS = {
    root:'🎯', product:'📦', supplier:'🏭', competitor:'⚔️',
    audience:'👥', channel:'📢', economics:'💰', risk:'⚠️',
    category:'📁', plan:'🗂️', warehouse:'🏪', generic:'📌'
  };
  const GROUP_COLORS = {
    root:      { bg:'#ef4444', border:'#b91c1c' },
    product:   { bg:'#22c55e', border:'#15803d' },
    supplier:  { bg:'#f59e0b', border:'#b45309' },
    competitor:{ bg:'#ec4899', border:'#be185d' },
    audience:  { bg:'#a78bfa', border:'#6d28d9' },
    channel:   { bg:'#38bdf8', border:'#0369a1' },
    economics: { bg:'#34d399', border:'#047857' },
    risk:      { bg:'#f87171', border:'#b91c1c' },
    category:  { bg:'#64748b', border:'#475569' },
    plan:      { bg:'#06b6d4', border:'#0e7490' },
    warehouse: { bg:'#60a5fa', border:'#1d4ed8' },
  };

  function makeGroups() {
    const g = {};
    for (const [key, c] of Object.entries(GROUP_COLORS)) {
      g[key] = {
        color: { background: c.bg, border: c.border, highlight: { background: c.bg, border: '#fff' } },
        shape: key === 'root' ? 'ellipse' : key === 'risk' ? 'diamond' : key === 'supplier' ? 'hexagon' : 'box',
        font: { color: '#111', size: key === 'root' ? 14 : 12 }
      };
    }
    return g;
  }

  function initVis() {
    if (typeof vis === 'undefined') {
      setStatus('vis-network не загрузился', 'err');
      return false;
    }
    nodes = new vis.DataSet([]);
    edges = new vis.DataSet([]);
    network = new vis.Network(
      document.getElementById('mynetwork'),
      { nodes, edges },
      {
        nodes: {
          shape: 'box',
          margin: { top: 8, right: 11, bottom: 8, left: 11 },
          widthConstraint: { maximum: 230 },
          font: { size: 12, color: '#111', multi: 'html' },
          borderWidth: 2,
          shadow: { enabled: true, size: 4, x: 2, y: 2, color: 'rgba(0,0,0,.25)' }
        },
        edges: {
          width: 1.5,
          arrows: { to: { enabled: true, scaleFactor: .6 } },
          color: { color: '#475569', highlight: '#6366f1' },
          smooth: false,
          font: { size: 0 }
        },
        groups: makeGroups(),
        layout: {
          hierarchical: {
            enabled: true,
            direction: 'LR',
            sortMethod: 'directed',
            levelSeparation: 240,
            nodeSpacing: 200,
            treeSpacing: 240,
            blockShifting: true,
            edgeMinimization: true,
            parentCentralization: true
          }
        },
        physics: { enabled: false },
        interaction: { dragView: true, zoomView: true, hover: true, tooltipDelay: 150 }
      }
    );

    network.on('click', ({ nodes: ids }) => {
      if (!ids.length) { closeDetails(); return; }
      const nd = nodes.get(ids[0]);
      if (nd) showDetails(nd);
    });

    visReady = true;
    return true;
  }

  // ── Build tree ───────────────────────────────────────────────────────
  const GROUP_LABELS = {
    economics:'Экономика', product:'Товары', competitor:'Конкуренты',
    audience:'Аудитория', channel:'Каналы', supplier:'Поставщики',
    risk:'Риски', warehouse:'Логистика', category:'Разделы', plan:'План'
  };

  function buildTree(rawNodes) {
    const root = rawNodes.find(n => n.group === 'root') || rawNodes[0];
    if (!root) return { nodes: [], edges: [] };

    const treeNodes = [{ ...root }];
    const treeEdges = [];
    const cats = new Map();
    let cid = 9e5;

    for (const node of rawNodes) {
      if (node.id === root.id) continue;
      if (node.group === 'category' || node.group === 'plan') {
        treeNodes.push(node);
        treeEdges.push({ from: root.id, to: node.id, label: '' });
        continue;
      }
      const key = node.group || 'category';
      if (!cats.has(key)) {
        const id = cid++;
        cats.set(key, id);
        treeNodes.push({ id, label: GROUP_LABELS[key] || key, group: 'category' });
        treeEdges.push({ from: root.id, to: id, label: '' });
      }
      treeNodes.push(node);
      treeEdges.push({ from: cats.get(key), to: node.id, label: '' });
    }
    return { nodes: treeNodes, edges: treeEdges };
  }

  // ── Render graph ─────────────────────────────────────────────────────
  function renderGraph(gNodes, gEdges) {
    if (!gNodes.length) return;
    if (!visReady) { showFallback(gNodes, gEdges); return; }
    hideFallback();
    const { nodes: tn, edges: te } = buildTree(gNodes);
    nodes.clear(); edges.clear();
    nodes.add(tn); edges.add(te);
    setTimeout(() => { network.redraw(); network.fit({ animation: { duration: 450 } }); }, 100);
  }

  function showFallback(gNodes, gEdges) {
    const box = document.getElementById('fallback-list');
    box.innerHTML = '<h3>Карта ниши (текст)</h3>'
      + gNodes.map(n => `<span class="chip ${n.group||''}">${escHtml(n.label)}</span>`).join('');
    box.classList.add('visible');
  }
  function hideFallback() { document.getElementById('fallback-list').classList.remove('visible'); }

  // ── Node details ─────────────────────────────────────────────────────
  function nodeIcon(group) { return GROUP_ICONS[group] || '📌'; }
  function groupName(g) {
    const map = { root:'Проект', product:'Товар', supplier:'Поставщик',
      competitor:'Конкурент', audience:'Аудитория', channel:'Канал',
      economics:'Экономика', risk:'Риск', category:'Раздел', plan:'План', warehouse:'Логистика' };
    return map[g] || g;
  }

  function showDetails(node) {
    selectedNode = node;
    document.getElementById('detail-icon').textContent = nodeIcon(node.group);
    document.getElementById('detail-title').textContent = node.label || 'Узел';
    document.getElementById('detail-group-badge').textContent = groupName(node.group);

    const c = GROUP_COLORS[node.group];
    if (c) document.getElementById('detail-group-badge').style.background = c.bg;

    let html = '';

    if (node.description) {
      html += `<div class="detail-section">
        <div class="detail-section-label">О блоке</div>
        <div class="detail-section-text">${escHtml(node.description)}</div>
      </div>`;
    }

    if (Array.isArray(node.insights) && node.insights.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Ключевые метрики</div>
        <ul class="detail-list">${node.insights.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>
      </div>`;
    }

    if (Array.isArray(node.actions) && node.actions.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Что делать</div>
        <ol class="detail-list">${node.actions.map(a => `<li>${escHtml(a)}</li>`).join('')}</ol>
      </div>`;
    }

    if (Array.isArray(node.sources) && node.sources.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Источники / поставщики</div>`;
      for (const s of node.sources) {
        const url = s?.url || '#';
        const title = s?.title || 'Ссылка';
        html += `<a class="detail-source-link" href="${url}" target="_blank" rel="noopener">
          🔗 ${escHtml(title)}<span class="link-arrow">↗</span>
        </a>`;
      }
      html += '</div>';
    }

    document.getElementById('detail-body').innerHTML = html || '<div style="color:var(--muted);font-size:13px;">Кликни «Уточнить у AI» чтобы разобрать этот блок.</div>';
    document.getElementById('details-panel').classList.add('active');
  }

  function closeDetails() {
    selectedNode = null;
    document.getElementById('details-panel').classList.remove('active');
  }

  function askAboutNode() {
    if (!selectedNode) return;
    closeDetails();
    const inp = document.getElementById('chatInput');
    inp.value = `По блоку "${selectedNode.label}" подскажи подробнее: `;
    inp.focus();
    autoGrow(inp);
  }

  // ── API helpers ───────────────────────────────────────────────────────
  function formatApiError(status, raw) {
    if (status === 502 || status === 503) {
      return 'API недоступен (туннель есть, сервер выключен). Запусти: ./scripts/01-api.sh и ./scripts/02-zrok.sh';
    }
    if (status === 404) return 'Эндпоинт не найден — проверь URL API в BASE_URL';
    return raw || `HTTP ${status}`;
  }

  async function apiPost(url, body) {
    let r;
    try {
      r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } catch (_) {
      throw new Error(
        'Нет связи с API (Failed to fetch). Запусти backend + zrok и обнови BASE_URL.'
      );
    }
    const text = await r.text();
    let data = {};
    try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { detail: text }; }
    if (!r.ok) {
      const detail = typeof data.detail === 'string' ? data.detail : formatApiError(r.status, text);
      throw new Error(detail);
    }
    return data;
  }

  async function pingApi() {
    try {
      const r = await fetch(BASE_URL + '/', { method: 'GET' });
      if (r.ok) {
        setStatus('API доступен', 'ok');
        return true;
      }
      setStatus(formatApiError(r.status, ''), 'err');
      return false;
    } catch (_) {
      setStatus('API недоступен — запусти backend + zrok', 'err');
      return false;
    }
  }

  // ── Start chat ────────────────────────────────────────────────────────
  async function startChat() {
    const query = document.getElementById('queryInput').value.trim();
    if (!query) { document.getElementById('queryInput').focus(); return; }

    document.getElementById('loading-overlay').classList.add('visible');
    document.getElementById('loading-text').textContent = 'Запускаю анализ…';
    setStatus('Запрос к AI…', 'busy');
    document.getElementById('chat-log').innerHTML = '';
    appendMsg('user', query);
    closeDetails();

    try {
      const data = await apiPost(CHAT_START_URL, { query });
      chatSessionId = data.session_id;
      appendMsg('ai', data.assistant_message);
      renderGraph(data.graph_nodes || [], data.graph_edges || []);
      setStatus(data.text_report || 'Чат запущен', 'ok');
    } catch (err) {
      setStatus('Ошибка: ' + err.message, 'err');
      appendMsg('ai', '❌ ' + err.message);
    } finally {
      document.getElementById('loading-overlay').classList.remove('visible');
    }
  }

  // ── Send message ──────────────────────────────────────────────────────
  async function sendMsg() {
    const inp = document.getElementById('chatInput');
    const msg = inp.value.trim();
    if (!msg) return;
    if (!chatSessionId) { appendMsg('ai', 'Сначала нажми Старт и опиши свою идею.'); return; }

    appendMsg('user', msg);
    inp.value = '';
    autoGrow(inp);
    setStatus('AI думает…', 'busy');

    try {
      const data = await apiPost(CHAT_MSG_URL, { session_id: chatSessionId, message: msg });
      appendMsg('ai', data.assistant_message);
      renderGraph(data.graph_nodes || [], data.graph_edges || []);
      setStatus(data.is_completed ? '✅ План собран. Кликай на блоки, задавай вопросы.' : 'Жду ответа', 'ok');
    } catch (err) {
      setStatus('Ошибка: ' + err.message, 'err');
      appendMsg('ai', '❌ ' + err.message);
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  function boot() {
    layoutHeights();
    initVis();

    document.getElementById('buildBtn').addEventListener('click', startChat);
    document.getElementById('sendChatBtn').addEventListener('click', sendMsg);
    document.getElementById('closeBtn').addEventListener('click', closeDetails);
    document.getElementById('askNodeBtn').addEventListener('click', askAboutNode);

    const ci = document.getElementById('chatInput');
    ci.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
    ci.addEventListener('input', () => autoGrow(ci));

    if (tg) tg.onEvent('viewportChanged', layoutHeights);
    window.addEventListener('resize', layoutHeights);

    const params = new URLSearchParams(location.search);
    let q = params.get('query') || '';
    const autostart = params.get('autostart') === '1';

    // Параметр из t.me-ссылки (?startapp=...)
    const startParam = tg?.initDataUnsafe?.start_param;
    if (!q && startParam) {
      try { q = decodeURIComponent(startParam); } catch (_) { q = startParam; }
    }

    const input = document.getElementById('queryInput');
    input.value = q;

    pingApi().then((ok) => {
      if (q && autostart && ok) {
        setStatus('Запускаю анализ…', 'busy');
        setTimeout(() => startChat(), 400);
      } else if (q && autostart && !ok) {
        setStatus('API недоступен — сначала запусти сервер', 'err');
      } else if (q) {
        setStatus(ok ? 'Идея подставлена — нажми Старт' : 'API недоступен', ok ? 'ok' : 'err');
      } else if (!ok) {
        setStatus('API недоступен — запусти backend + zrok', 'err');
      }
    });
  }

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', boot)
    : boot();
})();
</script>

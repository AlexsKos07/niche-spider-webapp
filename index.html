<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Niche Spider</title>
<link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/styles/vis-network.min.css" rel="stylesheet" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --tg-bg:       var(--tg-theme-bg-color,          #0a0a0c);
  --tg-text:     var(--tg-theme-text-color,         #f4f2ef);
  --tg-btn:      var(--tg-theme-button-color,       #c9a962);
  --tg-btn-text: var(--tg-theme-button-text-color,  #0c0c0e);
  --tg-hint:     var(--tg-theme-hint-color,         #8a8780);
  --tg-secondary:var(--tg-theme-secondary-bg-color, #121214);
  --tg-link:     var(--tg-theme-link-color,         #d4bc7a);
  --card:        #16161a;
  --border:      rgba(255,255,255,0.08);
  --radius:      14px;
  --accent:      #c9a962;
  --accent2:     #e8dcc0;
  --danger:      #c45c5c;
  --success:     #5c9a72;
  --warn:        #c9a962;
  --muted:       #5c5a56;
  --lux-gold:    #c9a962;
  --lux-gold-dim:rgba(201,169,98,0.28);
  --lux-ink:     #0c0c0e;
  --lux-graphite:#16161a;
  --lux-pearl:   #f4f2ef;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-bg);
  color: var(--tg-text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Layout ────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: var(--app-height, 100dvh);
}

/* ── Header ────────────────────────────────── */
#header {
  flex: 0 0 auto;
  padding: 10px 14px 8px;
  background: var(--tg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
#header-logo {
  font-size: 18px;
  line-height: 1;
}
#header-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--tg-text);
  flex: 1;
  letter-spacing: -0.02em;
}
#header-title span {
  color: var(--accent2);
}
#header-badge {
  font-size: 10px;
  font-weight: 700;
  background: rgba(201,169,98,0.15);
  color: var(--lux-gold);
  border: 1px solid rgba(201,169,98,0.35);
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.08em;
}

/* ── Input bar ─────────────────────────────── */
#input-bar {
  flex: 0 0 auto;
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--tg-secondary);
  border-bottom: 1px solid var(--border);
}
#queryInput {
  flex: 1;
  padding: 10px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--tg-bg);
  color: var(--tg-text);
  font-size: 15px;
  outline: none;
  transition: border-color .15s;
}
#queryInput:focus { border-color: var(--accent); }
#queryInput::placeholder { color: var(--muted); }
#buildBtn {
  flex: 0 0 auto;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(180deg, #d4bc7a 0%, #b8944f 100%);
  color: #0c0c0e;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: filter .15s, transform .1s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(201,169,98,0.25);
}
#buildBtn:active { filter: brightness(0.92); transform: scale(.97); }

/* ── Chat panel ────────────────────────────── */
#chat-panel {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 8px 12px 10px;
  background: var(--tg-secondary);
  border-bottom: 1px solid var(--border);
  max-height: 38vh;
  transition: max-height .25s ease, padding .25s ease;
}
#chat-panel.collapsed {
  max-height: 42px;
  padding: 6px 12px;
  gap: 0;
  overflow: hidden;
}
#chat-panel.collapsed #chat-log,
#chat-panel.collapsed #chat-input-row {
  display: none;
}
#chat-panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}
#chat-panel-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--tg-hint);
  letter-spacing: 0.02em;
}
#chat-free-badge {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent2);
  background: rgba(99,102,241,.15);
  border: 1px solid rgba(99,102,241,.35);
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: auto;
  margin-right: 6px;
}
#chatToggleBtn {
  flex: 0 0 auto;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--tg-bg);
  color: var(--tg-text);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
#chatToggleBtn:active { opacity: .85; }
#chat-log {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 28vh;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#chat-log::-webkit-scrollbar { width: 4px; }
#chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chat-msg {
  max-width: 88%;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start;
  background: var(--card);
  color: var(--tg-text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-msg.ai .ai-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 4px;
  display: block;
}

#chat-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
#chatInput {
  flex: 1;
  padding: 9px 13px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--tg-bg);
  color: var(--tg-text);
  font-size: 14px;
  outline: none;
  resize: none;
  transition: border-color .15s;
  min-height: 38px;
  max-height: 80px;
}
#chatInput:focus { border-color: var(--accent); }
#chatInput::placeholder { color: var(--muted); }
#sendChatBtn {
  flex: 0 0 auto;
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s;
}
#sendChatBtn:active { background: #4f46e5; transform: scale(.93); }

/* ── Status bar ────────────────────────────── */
#status-bar {
  flex: 0 0 auto;
  padding: 5px 14px;
  font-size: 11.5px;
  color: var(--tg-hint);
  background: var(--tg-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  min-height: 26px;
}
#status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background .2s;
}
#status-dot.ok   { background: var(--success); }
#status-dot.busy { background: var(--warn); animation: pulse 1s infinite; }
#status-dot.err  { background: var(--danger); }
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .4; }
}

/* ── Graph area (luxury) ───────────────────── */
#graph-container {
  flex: 1 1 0;
  position: relative;
  background: var(--lux-ink);
  min-height: 0;
  max-height: 100%;
  overflow: hidden;
  contain: strict;
}
.graph-stage {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.graph-grid {
  position: absolute;
  inset: 0;
  opacity: 0.45;
  background-image:
    linear-gradient(rgba(201,169,98,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,169,98,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: radial-gradient(ellipse 85% 75% at 50% 45%, #000 20%, transparent 100%);
  pointer-events: none;
}
.graph-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(64px);
  pointer-events: none;
  opacity: 0.55;
}
.graph-glow-a {
  width: 42vmin;
  height: 42vmin;
  top: -8%;
  left: -6%;
  background: rgba(201,169,98,0.14);
}
.graph-glow-b {
  width: 36vmin;
  height: 36vmin;
  right: -8%;
  bottom: 6%;
  background: rgba(92,122,110,0.12);
}
.graph-vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 90% 80% at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%),
    linear-gradient(180deg, rgba(12,12,14,0.35) 0%, transparent 18%, transparent 82%, rgba(12,12,14,0.5) 100%);
}
#mynetwork {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
  background: transparent;
  z-index: 1;
}
.graph-legend {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 8;
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  pointer-events: none;
}
.graph-legend.visible { display: flex; }
.legend-chip {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--lux-pearl);
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid var(--lc, var(--lux-gold-dim));
  background: rgba(12,12,14,0.72);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
#graph-tools {
  position: absolute;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 2px;
  padding: 4px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(18,18,20,0.78);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.06);
  z-index: 12;
}
.gt-btn {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--lux-pearl);
  font-size: 18px;
  font-weight: 300;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s ease, color .2s ease, transform .12s ease;
}
.gt-btn:hover { background: rgba(255,255,255,0.06); }
.gt-btn:active {
  transform: scale(0.94);
  background: rgba(201,169,98,0.18);
  color: var(--lux-gold);
}
.gt-divider {
  width: 1px;
  height: 22px;
  background: rgba(255,255,255,0.08);
  margin: 0 2px;
}

/* ── Fallback list ─────────────────────────── */
#fallback-list {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 14px;
  background: var(--tg-bg);
  display: none;
}
#fallback-list.visible { display: block; }
#fallback-list h3 { font-size: 14px; color: var(--tg-hint); margin-bottom: 10px; }
.chip {
  display: inline-block;
  margin: 4px 6px 4px 0;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--lux-pearl);
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(22,22,26,0.9);
}
.chip.root       { border-color: rgba(201,169,98,0.55); color: var(--lux-gold); }
.chip.product    { border-color: rgba(92,122,110,0.5); }
.chip.supplier   { border-color: rgba(138,115,85,0.5); }
.chip.competitor { border-color: rgba(122,92,110,0.5); }
.chip.audience   { border-color: rgba(107,101,137,0.5); }
.chip.channel    { border-color: rgba(74,107,138,0.5); }
.chip.economics  { border-color: rgba(74,122,98,0.5); }
.chip.risk       { border-color: rgba(138,74,82,0.5); }
.chip.category   { border-color: rgba(201,169,98,0.35); }
.chip.plan       { border-color: rgba(255,255,255,0.12); }

/* ── Loading overlay ───────────────────────── */
#loading-overlay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: rgba(12,12,14,0.88);
  backdrop-filter: blur(12px);
  z-index: 30;
}
#loading-overlay.visible { display: flex; }
.spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255,255,255,0.08);
  border-top-color: var(--lux-gold);
  border-radius: 50%;
  animation: spin .85s cubic-bezier(.4,0,.2,1) infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--tg-text);
}

/* ── Node detail sheet ─────────────────────── */
#details-panel {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  max-height: 82%;
  display: flex;
  flex-direction: column;
  background: rgba(18,18,20,0.96);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(201,169,98,0.35);
  border-radius: 22px 22px 0 0;
  padding: 0;
  box-shadow: 0 -16px 48px rgba(0,0,0,0.65);
  transform: translateY(105%);
  transition: transform .32s cubic-bezier(.32,.72,.24,1);
  z-index: 20;
  color: var(--tg-text);
}
#details-panel.active { transform: translateY(0); }
#detail-handle {
  width: 44px;
  height: 5px;
  border-radius: 3px;
  background: var(--border);
  margin: 9px auto 12px;
  cursor: pointer;
  flex-shrink: 0;
}
#detail-handle:active { background: var(--accent2); }
#detail-header {
  padding: 0 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-shrink: 0;
}
#detail-icon {
  font-size: 22px;
  flex-shrink: 0;
  line-height: 1;
  margin-top: 2px;
}
#detail-title {
  font-size: 16px;
  font-weight: 800;
  line-height: 1.25;
  flex: 1;
}
#detail-group-badge {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
  background: transparent;
  color: var(--lux-gold);
  white-space: nowrap;
  margin-top: 3px;
}
#detail-body { padding: 14px 16px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.detail-section {
  margin-bottom: 14px;
}
.detail-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--tg-hint);
  margin-bottom: 6px;
}
.detail-section-text {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--tg-text);
}
.detail-list { padding-left: 16px; font-size: 13px; line-height: 1.7; }
.detail-list li { margin-bottom: 2px; }
.detail-source-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--tg-bg);
  text-decoration: none;
  color: var(--tg-link);
  font-size: 13px;
  font-weight: 600;
}
.detail-source-link:active { opacity: .75; }
.link-arrow { font-size: 14px; margin-left: auto; color: var(--muted); }
#detail-actions {
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: row;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--card);
}
#detail-actions .detail-btn { flex: 1; }
.detail-btn {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.detail-btn:active { opacity: .8; transform: scale(.98); }
#askNodeBtn  { background: rgba(99,102,241,.18); color: var(--accent2); }
#askNodeBtn:disabled { opacity: .45; cursor: not-allowed; }
#closeBtn    { background: var(--border); color: var(--tg-text); }
.detail-tip-box {
  margin-top: 6px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(99,102,241,.1);
  border: 1px solid rgba(99,102,241,.25);
  font-size: 13px;
  line-height: 1.45;
  color: var(--tg-text);
}
.detail-source-card {
  margin-bottom: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--tg-bg);
}
.detail-source-domain {
  font-size: 11px;
  color: var(--tg-hint);
  margin-top: 2px;
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="header-logo">🕷️</div>
    <div id="header-title">Niche <span>Spider</span></div>
    <div id="header-badge">AI</div>
  </div>

  <!-- Query input -->
  <div id="input-bar">
    <input id="queryInput" type="text" placeholder="Опиши идею бизнеса…" autocomplete="off">
    <button id="buildBtn" type="button">Старт</button>
  </div>

  <!-- Chat -->
  <div id="chat-panel">
    <div id="chat-panel-head">
      <span id="chat-panel-title">Чат с AI</span>
      <span id="chat-free-badge" title="Бесплатные вопросы к AI после опроса">AI 5/5</span>
      <button id="chatToggleBtn" type="button" aria-expanded="true">▼ Свернуть</button>
    </div>
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <textarea id="chatInput" placeholder="Ответь на вопрос AI…" rows="1"></textarea>
      <button id="sendChatBtn" type="button">&#10148;</button>
    </div>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Введи идею и нажми Старт</span>
  </div>

  <!-- Graph -->
  <div id="graph-container">
    <div class="graph-stage">
      <div class="graph-grid" aria-hidden="true"></div>
      <div class="graph-glow graph-glow-a" aria-hidden="true"></div>
      <div class="graph-glow graph-glow-b" aria-hidden="true"></div>
      <div id="mynetwork"></div>
      <div class="graph-vignette" aria-hidden="true"></div>
      <div id="graph-legend" class="graph-legend" aria-hidden="true"></div>
    </div>
    <div id="graph-tools">
      <button id="gtZoomOut" class="gt-btn" type="button" title="Отдалить" aria-label="Отдалить">−</button>
      <span class="gt-divider" aria-hidden="true"></span>
      <button id="gtFit" class="gt-btn" type="button" title="Вписать в экран" aria-label="Вписать">◎</button>
      <span class="gt-divider" aria-hidden="true"></span>
      <button id="gtZoomIn" class="gt-btn" type="button" title="Приблизить" aria-label="Приблизить">+</button>
    </div>
    <div id="fallback-list"></div>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-text">Анализирую…</div>
    </div>

    <!-- Node detail sheet -->
    <div id="details-panel">
      <div id="detail-handle"></div>
      <div id="detail-header">
        <div id="detail-icon">📌</div>
        <div style="flex:1">
          <div id="detail-title"></div>
        </div>
        <div id="detail-group-badge"></div>
      </div>
      <div id="detail-body"></div>
      <div id="detail-actions">
        <button id="askNodeBtn" class="detail-btn" type="button">💬 Уточнить у AI</button>
        <button id="closeBtn" class="detail-btn" type="button">Закрыть</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
(function () {
  const BASE_URL = 'https://f7wr05xsf7d1.share.zrok.io';
  const API_URL        = BASE_URL + '/analyze';
  const CHAT_START_URL = BASE_URL + '/chat/start';
  const CHAT_MSG_URL   = BASE_URL + '/chat/message';
  const tg = window.Telegram?.WebApp;

  let network = null, nodes = null, edges = null, visReady = false;
  const GRAPH_ZOOM_MIN = 0.35;
  const GRAPH_ZOOM_MAX = 1.65;
  let chatSessionId = null, selectedNode = null, chatCompleted = false;
  let freeQuestionsLeft = 5, freeQuestionsLimit = 5;
  let graphNodeMeta = new Map();

  function updateFreeBadge(left, limit) {
    freeQuestionsLeft = left;
    freeQuestionsLimit = limit;
    const el = document.getElementById('chat-free-badge');
    if (!el) return;
    if (!chatCompleted) {
      el.textContent = 'опрос';
      el.title = 'Сначала ответьте на вопросы — потом до ' + limit + ' вопросов к AI';
      return;
    }
    el.textContent = 'AI ' + left + '/' + limit;
    el.title = 'Бесплатных вопросов к AI осталось: ' + left + ' из ' + limit;
    if (left === 0) el.style.opacity = '0.55';
    else el.style.opacity = '1';
  }

  // ── Status ──────────────────────────────────────────────────────────
  function setStatus(text, state = 'idle') {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('status-dot');
    dot.className = '';
    if (state === 'ok')   dot.classList.add('ok');
    if (state === 'busy') dot.classList.add('busy');
    if (state === 'err')  dot.classList.add('err');
  }

  // ── Chat messages ────────────────────────────────────────────────────
  function appendMsg(role, text) {
    const log = document.getElementById('chat-log');
    const el = document.createElement('div');
    el.className = 'chat-msg ' + role;
    if (role === 'ai') {
      el.innerHTML = '<span class="ai-label">🤖 AI</span>' + escHtml(text);
    } else {
      el.textContent = text;
    }
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Layout ───────────────────────────────────────────────────────────
  function layoutHeights() {
    if (tg) { tg.ready(); tg.expand(); }
    const h = tg?.viewportStableHeight || tg?.viewportHeight || window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
    if (network) setTimeout(() => { network.redraw(); }, 80);
  }

  // ── Auto-grow textarea ───────────────────────────────────────────────
  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  // ── Vis init (luxury graph) ─────────────────────────────────────────
  const LUX_FONT = "-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif";
  const GROUP_ICONS = {
    root:'◆', product:'◇', supplier:'◈', competitor:'◆',
    audience:'◎', channel:'▣', economics:'◉', risk:'!',
    category:'—', plan:'·', warehouse:'▤', generic:'·'
  };
  const LUX = {
    gold: '#C9A962',
    edgeHub: 'rgba(201,169,98,0.28)',
    edgeLeaf: 'rgba(255,255,255,0.1)',
    groups: {
      root:      { fill: '#1A1812', border: '#C9A962', glow: 'rgba(201,169,98,0.32)', font: '#F5F0E8' },
      product:   { fill: '#141816', border: '#5C7A6E', glow: 'rgba(92,122,110,0.22)', font: '#E6EDE9' },
      supplier:  { fill: '#181614', border: '#8A7355', glow: 'rgba(138,115,85,0.2)', font: '#EDE8E0' },
      competitor:{ fill: '#181416', border: '#7A5C6E', glow: 'rgba(122,92,110,0.2)', font: '#EDE6EA' },
      audience:  { fill: '#141418', border: '#6B6589', glow: 'rgba(107,101,137,0.2)', font: '#E8E6F0' },
      channel:   { fill: '#12161A', border: '#4A6B8A', glow: 'rgba(74,107,138,0.2)', font: '#E4ECF4' },
      economics: { fill: '#121816', border: '#4A7A62', glow: 'rgba(74,122,98,0.22)', font: '#E2F0E8' },
      risk:      { fill: '#1A1214', border: '#8A4A52', glow: 'rgba(138,74,82,0.22)', font: '#F0E4E6' },
      category:  { fill: '#101012', border: 'rgba(201,169,98,0.45)', glow: 'rgba(201,169,98,0.14)', font: '#C9A962' },
      plan:      { fill: '#141418', border: 'rgba(232,230,227,0.18)', glow: 'rgba(0,0,0,0.2)', font: '#B8B4AC' },
      warehouse: { fill: '#12161A', border: '#4A6B8A', glow: 'rgba(74,107,138,0.18)', font: '#E4ECF4' },
      generic:   { fill: '#16161A', border: 'rgba(255,255,255,0.12)', glow: 'rgba(0,0,0,0.25)', font: '#E8E6E3' },
    }
  };

  function luxStyle(group) {
    return LUX.groups[group] || LUX.groups.generic;
  }

  function makeGroups() {
    const g = {};
    for (const [key, style] of Object.entries(LUX.groups)) {
      g[key] = {
        color: {
          background: style.fill,
          border: style.border,
          highlight: { background: style.fill, border: LUX.gold },
          hover: { background: style.fill, border: LUX.gold }
        },
        borderWidth: key === 'root' ? 2 : 1.5,
        font: {
          color: style.font,
          face: LUX_FONT,
          multi: false
        }
      };
    }
    return g;
  }

  function initVis() {
    if (typeof vis === 'undefined') {
      setStatus('vis-network не загрузился', 'err');
      return false;
    }
    nodes = new vis.DataSet([]);
    edges = new vis.DataSet([]);
    network = new vis.Network(
      document.getElementById('mynetwork'),
      { nodes, edges },
      {
        nodes: {
          shape: 'box',
          margin: { top: 10, right: 14, bottom: 10, left: 14 },
          widthConstraint: { minimum: 72, maximum: 168 },
          heightConstraint: { minimum: 36, valign: 'middle' },
          font: { size: 11, color: '#F4F2EF', face: LUX_FONT, vadjust: 0 },
          borderWidth: 1.5,
          borderWidthSelected: 2,
          shapeProperties: { borderRadius: 14 },
          shadow: {
            enabled: true,
            size: 10,
            x: 0,
            y: 3,
            color: 'rgba(0,0,0,0.45)'
          }
        },
        edges: {
          width: 1,
          selectionWidth: 1.5,
          hoverWidth: 1.25,
          arrows: { to: { enabled: true, scaleFactor: 0.42, type: 'arrow' } },
          color: {
            color: LUX.edgeLeaf,
            highlight: LUX.gold,
            hover: 'rgba(201,169,98,0.55)',
            opacity: 0.85
          },
          smooth: {
            enabled: true,
            type: 'cubicBezier',
            forceDirection: 'horizontal',
            roundness: 0.38
          },
          font: { size: 0 }
        },
        groups: makeGroups(),
        layout: {
          improvedLayout: true,
          hierarchical: {
            enabled: true,
            direction: 'LR',
            sortMethod: 'directed',
            shakeTowards: 'roots',
            levelSeparation: 168,
            nodeSpacing: 68,
            treeSpacing: 88,
            blockShifting: true,
            edgeMinimization: true,
            parentCentralization: true
          }
        },
        physics: { enabled: false },
        interaction: {
          dragView: true,
          zoomView: true,
          hover: true,
          tooltipDelay: 120,
          hideEdgesOnDrag: false,
          navigationButtons: false,
          keyboard: false,
          zoomSpeed: 0.55,
          multiselect: false
        },
        configure: { enabled: false }
      }
    );

    network.on('click', ({ nodes: ids }) => {
      collapseChatForGraph();
      if (!ids.length) { closeDetails(); return; }
      const nd = resolveNode(ids[0]);
      if (nd) showDetails(nd);
    });
    network.on('dragStart', collapseChatForGraph);
    network.on('zoom', () => {
      collapseChatForGraph();
      clampGraphZoom();
    });
    network.on('dragEnd', () => { softClampGraphPan(); });
    network.on('hoverNode', () => {
      document.getElementById('mynetwork').style.cursor = 'pointer';
    });
    network.on('blurNode', () => {
      document.getElementById('mynetwork').style.cursor = 'default';
    });

    visReady = true;
    return true;
  }

  // ── Build tree ───────────────────────────────────────────────────────
  const GROUP_LABELS = {
    economics:'Экономика', product:'Товары', competitor:'Конкуренты',
    audience:'Аудитория', channel:'Каналы', supplier:'Поставщики',
    risk:'Риски', warehouse:'Логистика', category:'Разделы', plan:'План'
  };

  function shortenLabel(label, maxLen = 44) {
    let s = String(label || '').trim();
    if (!s) return '—';
    const srcIdx = s.indexOf(' — источник:');
    if (srcIdx > 0) s = s.slice(0, srcIdx).trim();
    const dashIdx = s.search(/\s—\shttps?:\/\//i);
    if (dashIdx > 0) s = s.slice(0, dashIdx).trim();
    s = s.replace(/https?:\/\/\S+/gi, '').replace(/\s+/g, ' ').trim();
    if (s.length > maxLen) s = s.slice(0, maxLen - 1) + '…';
    return s || '—';
  }

  function nodeForVis(node) {
    const label = String(node.label || '');
    const isProgressRoot = node.group === 'root' && /^Опрос/.test(label);
    const isSectionHeader =
      node.group === 'category' ||
      Object.values(GROUP_LABELS).includes(label) ||
      label === 'Ваши ответы';
    const keepFull = isProgressRoot || isSectionHeader;
    return { ...node, label: keepFull ? node.label : shortenLabel(node.label, 38) };
  }

  function enrichNodesForLuxury(rawNodes) {
    return rawNodes.map((node) => {
      const g = node.group || 'generic';
      const style = luxStyle(g);
      const base = { ...node };
      const isHub = g === 'category' && node.id >= 9e5;
      const isRoot = g === 'root';
      const isPlan = g === 'plan' || node.label === 'Ваши ответы';

      base.color = {
        background: style.fill,
        border: style.border,
        highlight: { background: style.fill, border: LUX.gold },
        hover: { background: style.fill, border: LUX.gold }
      };
      base.shadow = {
        enabled: true,
        size: isRoot ? 22 : (isHub ? 10 : 7),
        x: 0,
        y: isRoot ? 5 : 2,
        color: style.glow
      };
      base.font = {
        face: LUX_FONT,
        color: style.font,
        multi: false,
        vadjust: 0
      };

      if (isRoot) {
        base.shape = 'ellipse';
        base.size = 36;
        base.borderWidth = 2;
        base.font.size = 12;
        base.font.bold = true;
      } else if (isHub) {
        base.shape = 'box';
        base.label = String(base.label).toUpperCase();
        base.borderWidth = 1.5;
        base.widthConstraint = { minimum: 76, maximum: 120 };
        base.heightConstraint = { minimum: 30, valign: 'middle' };
        base.font.size = 9;
        base.font.bold = true;
        base.shapeProperties = { borderRadius: 18 };
      } else if (isPlan) {
        base.shape = 'box';
        base.borderWidth = 1;
        base.widthConstraint = { minimum: 64, maximum: 148 };
        base.font.size = 10;
        base.shapeProperties = { borderRadius: 12 };
      } else if (g === 'risk') {
        base.shape = 'diamond';
        base.size = 22;
        base.borderWidth = 1.5;
        base.font.size = 10;
      } else if (g === 'economics') {
        base.shape = 'box';
        base.borderWidth = 1.5;
        base.widthConstraint = { minimum: 80, maximum: 156 };
        base.font.size = 10;
        base.shapeProperties = { borderRadius: 14 };
      } else {
        base.shape = 'box';
        base.borderWidth = 1.5;
        base.widthConstraint = { minimum: 68, maximum: 152 };
        base.heightConstraint = { minimum: 34, valign: 'middle' };
        base.font.size = 11;
        base.shapeProperties = { borderRadius: 14 };
      }
      return base;
    });
  }

  function enrichEdgesForLuxury(rawEdges, hubIds, rootId) {
    const hubs = hubIds || new Set();
    return rawEdges.map((edge) => {
      const touchesHub = hubs.has(edge.from) || hubs.has(edge.to);
      const touchesRoot = edge.from === rootId || edge.to === rootId;
      const isTrunk = touchesHub || touchesRoot;
      return {
        ...edge,
        width: isTrunk ? 1.15 : 0.85,
        color: {
          color: isTrunk ? LUX.edgeHub : LUX.edgeLeaf,
          highlight: LUX.gold,
          hover: 'rgba(201,169,98,0.5)',
          opacity: isTrunk ? 0.9 : 0.65
        },
        smooth: {
          enabled: true,
          type: 'cubicBezier',
          forceDirection: 'horizontal',
          roundness: isTrunk ? 0.32 : 0.42
        }
      };
    });
  }

  function updateGraphLegend(nodeList) {
    const el = document.getElementById('graph-legend');
    if (!el) return;
    const chips = [];
    const seen = new Set();
    for (const n of nodeList) {
      if (n.group !== 'category' || n.id < 9e5) continue;
      const label = String(n.label || '').trim();
      if (!label || seen.has(label)) continue;
      seen.add(label);
      const key = Object.entries(GROUP_LABELS).find(([, v]) => v.toUpperCase() === label)?.[0] || 'category';
      const style = luxStyle(key);
      chips.push(
        `<span class="legend-chip" style="--lc:${style.border}">${escHtml(label)}</span>`
      );
    }
    el.innerHTML = chips.join('');
    el.classList.toggle('visible', chips.length > 0);
    el.setAttribute('aria-hidden', chips.length ? 'false' : 'true');
  }

  function clampGraphZoom() {
    if (!network) return;
    const scale = network.getScale();
    if (scale < GRAPH_ZOOM_MIN) network.moveTo({ scale: GRAPH_ZOOM_MIN, animation: false });
    else if (scale > GRAPH_ZOOM_MAX) network.moveTo({ scale: GRAPH_ZOOM_MAX, animation: false });
  }

  function fitGraphToView(animate = true) {
    if (!network || !nodes) return;
    const ids = nodes.getIds();
    if (!ids.length) return;
    network.fit({
      nodes: ids,
      animation: animate ? { duration: 420, easingFunction: 'easeInOutQuad' } : false,
      minZoomLevel: GRAPH_ZOOM_MIN,
      maxZoomLevel: GRAPH_ZOOM_MAX,
    });
  }

  function softClampGraphPan() {
    if (!network || !nodes) return;
    const ids = nodes.getIds();
    if (!ids.length) return;
    const box = network.getBoundingBox(ids);
    if (!box) return;
    const canvas = network.getScale();
    const view = network.getViewPosition();
    const container = document.getElementById('mynetwork');
    if (!container) return;
    const w = container.clientWidth / canvas;
    const h = container.clientHeight / canvas;
    const pad = 120;
    const cx = (box.left + box.right) / 2;
    const cy = (box.top + box.bottom) / 2;
    const tooFar =
      box.right < view.x - w / 2 + pad ||
      box.left > view.x + w / 2 - pad ||
      box.bottom < view.y - h / 2 + pad ||
      box.top > view.y + h / 2 - pad;
    if (tooFar) fitGraphToView(true);
  }

  function buildTree(rawNodes) {
    const root = rawNodes.find(n => n.group === 'root') || rawNodes[0];
    if (!root) return { nodes: [], edges: [], hubIds: new Set(), rootId: null };

    const treeNodes = [nodeForVis(root)];
    const treeEdges = [];
    const cats = new Map();
    const hubIds = new Set();
    let cid = 9e5;

    for (const node of rawNodes) {
      if (node.id === root.id) continue;
      if (node.group === 'category' || node.group === 'plan') {
        treeNodes.push(nodeForVis(node));
        treeEdges.push({ from: root.id, to: node.id, label: '' });
        if (node.group === 'category') hubIds.add(node.id);
        continue;
      }
      const key = node.group || 'category';
      if (!cats.has(key)) {
        const id = cid++;
        cats.set(key, id);
        hubIds.add(id);
        treeNodes.push({ id, label: GROUP_LABELS[key] || key, group: 'category' });
        treeEdges.push({ from: root.id, to: id, label: '' });
      }
      treeNodes.push(nodeForVis(node));
      treeEdges.push({ from: cats.get(key), to: node.id, label: '' });
    }
    return { nodes: treeNodes, edges: treeEdges, hubIds, rootId: root.id };
  }

  // ── Render graph ─────────────────────────────────────────────────────
  function resolveNode(idOrNode) {
    if (idOrNode == null) return null;
    const id = typeof idOrNode === 'object' ? idOrNode.id : idOrNode;
    return graphNodeMeta.get(id) || nodes.get(id) || null;
  }

  function renderGraph(gNodes, gEdges) {
    if (!gNodes.length) return;
    graphNodeMeta.clear();
    for (const n of gNodes) graphNodeMeta.set(n.id, n);
    if (!visReady) { showFallback(gNodes, gEdges); return; }
    hideFallback();
    const { nodes: tn, edges: te, hubIds, rootId } = buildTree(gNodes);
    const luxNodes = enrichNodesForLuxury(tn);
    const luxEdges = enrichEdgesForLuxury(te, hubIds, rootId);
    nodes.clear();
    edges.clear();
    nodes.add(luxNodes);
    edges.add(luxEdges);
    updateGraphLegend(luxNodes);
    document.getElementById('graph-container').classList.add('graph-live');
    setTimeout(() => {
      network.redraw();
      fitGraphToView(true);
    }, 120);
  }

  function showFallback(gNodes, gEdges) {
    const box = document.getElementById('fallback-list');
    box.innerHTML = '<h3>Карта ниши</h3>'
      + gNodes.map(n => `<span class="chip ${n.group||''}">${escHtml(n.label)}</span>`).join('');
    box.classList.add('visible');
  }
  function hideFallback() { document.getElementById('fallback-list').classList.remove('visible'); }

  // ── Node details ─────────────────────────────────────────────────────
  function nodeIcon(group) { return GROUP_ICONS[group] || '📌'; }
  function groupName(g) {
    const map = { root:'Проект', product:'Товар', supplier:'Поставщик',
      competitor:'Конкурент', audience:'Аудитория', channel:'Канал',
      economics:'Экономика', risk:'Риск', category:'Раздел', plan:'План', warehouse:'Логистика' };
    return map[g] || g;
  }

  const GROUP_WHY = {
    economics: 'Экономика показывает, сойдётся ли проект по деньгам: маржа, чек и прибыль.',
    product: 'Товар/услуга — то, что вы тестируете на спрос и сравниваете с конкурентами.',
    competitor: 'Конкуренты задают ценовой коридор и уровень ожиданий клиента.',
    audience: 'Аудитория определяет оффер, каналы и тон коммуникации.',
    channel: 'Канал — где вы покупаете внимание и первые продажи.',
    supplier: 'Поставщик влияет на себестоимость, сроки и риск качества.',
    risk: 'Риски — то, что может «съесть» маржу или сорвать запуск.',
    root: 'Корень проекта: сводка гипотез по нише.',
    plan: 'Параметры из вашего диалога с AI.',
    category: 'Группа связанных блоков на карте.',
  };

  function sourceDomain(url) {
    try {
      return new URL(url).hostname.replace(/^www\./, '');
    } catch (_) {
      return '';
    }
  }

  function showDetails(node) {
    const meta = resolveNode(node.id) || node;
    selectedNode = meta;
    const title = meta.full_label || meta.label || 'Узел';
    const askBtn = document.getElementById('askNodeBtn');

    document.getElementById('detail-icon').textContent = nodeIcon(meta.group);
    document.getElementById('detail-title').textContent = title;

    const c = luxStyle(meta.group);
    const badge = document.getElementById('detail-group-badge');
    badge.textContent = groupName(meta.group);
    if (c) {
      badge.style.background = 'transparent';
      badge.style.border = `1px solid ${c.border}`;
      badge.style.color = c.font;
    }

    if (askBtn) {
      askBtn.disabled = !chatSessionId;
      askBtn.textContent = chatCompleted
        ? '💬 Уточнить у AI'
        : '💬 Уточнить у AI (после опроса)';
    }

    let html = '';
    const detailCopyUrls = [];

    if (GROUP_WHY[meta.group]) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Зачем этот блок</div>
        <div class="detail-tip-box">${escHtml(GROUP_WHY[meta.group])}</div>
      </div>`;
    }

    if (meta.description) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Суть</div>
        <div class="detail-section-text">${escHtml(meta.description)}</div>
      </div>`;
    }

    if (Array.isArray(meta.insights) && meta.insights.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Ключевое</div>
        <ul class="detail-list">${meta.insights.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>
      </div>`;
    }

    if (Array.isArray(meta.tips) && meta.tips.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">На что обратить внимание</div>
        <ul class="detail-list">${meta.tips.map(t => `<li>${escHtml(t)}</li>`).join('')}</ul>
      </div>`;
    }

    if (Array.isArray(meta.actions) && meta.actions.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Пошагово</div>
        <ol class="detail-list">${meta.actions.map(a => `<li>${escHtml(a)}</li>`).join('')}</ol>
      </div>`;
    }

    if (Array.isArray(meta.sources) && meta.sources.length) {
      html += `<div class="detail-section">
        <div class="detail-section-label">Источники из поиска</div>`;
      for (const s of meta.sources) {
        const url = s?.url || '';
        const titleSrc = _shortSourceTitle(s?.title || 'Источник');
        const passages = Array.isArray(s?.passages) ? s.passages.filter(Boolean) : [];
        const domain = sourceDomain(url);
        const safeUrl = escHtml(url);
        let copyBtn = '';
        if (url) {
          const copyIdx = detailCopyUrls.length;
          detailCopyUrls.push(url);
          copyBtn = `<button type="button" class="detail-btn copy-src-btn" data-copy-idx="${copyIdx}" style="width:auto;padding:8px 10px;font-size:12px;background:rgba(99,102,241,.18);color:var(--accent2);border-radius:10px;">Копировать</button>`;
        }
        html += `<div class="detail-source-card">
          <div style="display:flex;gap:8px;align-items:flex-start;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:14px;">${escHtml(titleSrc)}</div>
              ${domain ? `<div class="detail-source-domain">${escHtml(domain)}</div>` : ''}
            </div>
            ${copyBtn}
          </div>`;
        for (const p of passages.slice(0, 2)) {
          html += `<div style="margin-top:8px;font-size:13px;line-height:1.45;color:var(--tg-text);">${escHtml(p)}</div>`;
        }
        if (url) {
          html += `<a class="detail-source-link" href="${safeUrl}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;font-size:13px;">
            Открыть источник <span class="link-arrow">↗</span>
          </a>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }

    document.getElementById('detail-body').innerHTML = html || '<div style="color:var(--muted);font-size:13px;">Нажми «Уточнить у AI» — разберём блок в чате.</div>';
    document.getElementById('details-panel').classList.add('active');

    document.querySelectorAll('.copy-src-btn').forEach(btn => {
      const url = detailCopyUrls[Number(btn.getAttribute('data-copy-idx'))];
      if (url) btn.onclick = () => window.__copyLink(url);
    });
  }

  function _shortSourceTitle(title) {
    let s = String(title || '').trim();
    if (s.startsWith('http')) {
      const d = sourceDomain(s);
      return d || 'Источник';
    }
    return shortenLabel(s, 56);
  }

  function closeDetails() {
    selectedNode = null;
    document.getElementById('details-panel').classList.remove('active');
  }

  function setChatCollapsed(collapsed) {
    const panel = document.getElementById('chat-panel');
    const btn = document.getElementById('chatToggleBtn');
    panel.classList.toggle('collapsed', collapsed);
    btn.textContent = collapsed ? '▲ Развернуть чат' : '▼ Свернуть';
    btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    if (network) setTimeout(() => network.redraw(), 60);
  }

  function expandChatPanel() { setChatCollapsed(false); }

  function toggleChatPanel() {
    const collapsed = document.getElementById('chat-panel').classList.contains('collapsed');
    setChatCollapsed(!collapsed);
  }

  // Автоскрытие верхнего чата, когда пользователь работает с графом.
  function collapseChatForGraph() {
    const panel = document.getElementById('chat-panel');
    if (!panel.classList.contains('collapsed')) setChatCollapsed(true);
  }

  async function sendMsgText(msg) {
    if (!msg || !chatSessionId) return;
    setStatus('AI думает…', 'busy');
    document.getElementById('loading-overlay').classList.add('visible');
    document.getElementById('loading-text').textContent = 'Готовлю ответ…';
    try {
      const data = await apiPost(CHAT_MSG_URL, { session_id: chatSessionId, message: msg });
      chatCompleted = !!data.is_completed;
      updateFreeBadge(
        data.free_questions_left ?? freeQuestionsLeft,
        data.free_questions_limit ?? freeQuestionsLimit
      );
      if (!data.is_completed) expandChatPanel();
      appendMsg('ai', data.assistant_message);
      renderGraph(data.graph_nodes || [], data.graph_edges || []);
      setStatus(
        data.is_completed
          ? ('✅ Граф готов · AI вопросов: ' + (data.free_questions_left ?? 0))
          : 'Жду ответа на вопросы',
        'ok'
      );
    } catch (err) {
      setStatus('Ошибка: ' + err.message, 'err');
      appendMsg('ai', '❌ ' + err.message);
    } finally {
      document.getElementById('loading-overlay').classList.remove('visible');
    }
  }

  async function askAboutNode() {
    const meta = selectedNode && resolveNode(selectedNode.id);
    if (!meta) return;
    if (!chatSessionId) {
      expandChatPanel();
      appendMsg('ai', 'Сначала нажми «Старт» и опиши идею бизнеса.');
      return;
    }
    if (chatCompleted && freeQuestionsLeft <= 0) {
      expandChatPanel();
      appendMsg('ai', 'Лимит бесплатных вопросов к AI исчерпан. Откройте карточку блока на графе.');
      return;
    }
    const title = meta.full_label || meta.label || 'блок';
    const question = `По блоку «${title}» (${groupName(meta.group)}): что важно учесть и какие конкретные шаги сделать?`;
    closeDetails();
    expandChatPanel();
    appendMsg('user', question);
    await sendMsgText(question);
  }

  // ── API helpers ───────────────────────────────────────────────────────
  function formatApiError(status, raw) {
    if (status === 502 || status === 503) {
      return 'API недоступен (туннель есть, сервер выключен). Запусти: ./scripts/01-api.sh и ./scripts/02-zrok.sh';
    }
    if (status === 404) return 'Эндпоинт не найден — проверь URL API в BASE_URL';
    return raw || `HTTP ${status}`;
  }

  async function apiPost(url, body) {
    let r;
    try {
      r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } catch (_) {
      throw new Error(
        'Нет связи с API (Failed to fetch). Запусти backend + zrok и обнови BASE_URL.'
      );
    }
    const text = await r.text();
    let data = {};
    try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { detail: text }; }
    if (!r.ok) {
      const detail = typeof data.detail === 'string' ? data.detail : formatApiError(r.status, text);
      throw new Error(detail);
    }
    return data;
  }

  async function pingApi() {
    try {
      const r = await fetch(BASE_URL + '/', { method: 'GET' });
      if (r.ok) {
        setStatus('API доступен', 'ok');
        return true;
      }
      setStatus(formatApiError(r.status, ''), 'err');
      return false;
    } catch (_) {
      setStatus('API недоступен — запусти backend + zrok', 'err');
      return false;
    }
  }

  // ── Start chat ────────────────────────────────────────────────────────
  async function startChat() {
    const query = document.getElementById('queryInput').value.trim();
    if (!query) { document.getElementById('queryInput').focus(); return; }

    document.getElementById('loading-overlay').classList.add('visible');
    document.getElementById('loading-text').textContent = 'Запускаю анализ…';
    setStatus('Запрос к AI…', 'busy');
    document.getElementById('chat-log').innerHTML = '';
    appendMsg('user', query);
    closeDetails();

    try {
      const data = await apiPost(CHAT_START_URL, { query });
      chatSessionId = data.session_id;
      chatCompleted = !!data.is_completed;
      updateFreeBadge(
        data.free_questions_left ?? 5,
        data.free_questions_limit ?? 5
      );
      appendMsg('ai', data.assistant_message);
      renderGraph(data.graph_nodes || [], data.graph_edges || []);
      setStatus(data.text_report || 'Ответьте на вопросы — граф появится в конце', 'ok');
    } catch (err) {
      setStatus('Ошибка: ' + err.message, 'err');
      appendMsg('ai', '❌ ' + err.message);
    } finally {
      document.getElementById('loading-overlay').classList.remove('visible');
    }
  }

  // ── Send message ──────────────────────────────────────────────────────
  async function sendMsg() {
    const inp = document.getElementById('chatInput');
    const msg = inp.value.trim();
    if (!msg) return;
    if (!chatSessionId) { appendMsg('ai', 'Сначала нажми Старт и опиши свою идею.'); return; }

    expandChatPanel();
    appendMsg('user', msg);
    inp.value = '';
    autoGrow(inp);
    document.getElementById('loading-text').textContent = 'Обрабатываю ответ…';
    await sendMsgText(msg);
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  function boot() {
    layoutHeights();
    initVis();

    document.getElementById('buildBtn').addEventListener('click', startChat);
    document.getElementById('sendChatBtn').addEventListener('click', sendMsg);
    document.getElementById('closeBtn').addEventListener('click', closeDetails);
    document.getElementById('askNodeBtn').addEventListener('click', () => { askAboutNode(); });
    document.getElementById('chatToggleBtn').addEventListener('click', toggleChatPanel);
    document.getElementById('detail-handle').addEventListener('click', closeDetails);

    const zoomBy = (factor) => {
      if (!network) return;
      const s = Math.min(GRAPH_ZOOM_MAX, Math.max(GRAPH_ZOOM_MIN, network.getScale() * factor));
      network.moveTo({ scale: s, animation: { duration: 200 } });
    };
    document.getElementById('gtZoomIn').addEventListener('click', () => zoomBy(1.3));
    document.getElementById('gtZoomOut').addEventListener('click', () => zoomBy(0.77));
    document.getElementById('gtFit').addEventListener('click', () => fitGraphToView(true));

    const ci = document.getElementById('chatInput');
    ci.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
    ci.addEventListener('input', () => autoGrow(ci));

    if (tg) tg.onEvent('viewportChanged', layoutHeights);
    window.addEventListener('resize', layoutHeights);

    const params = new URLSearchParams(location.search);
    let q = params.get('query') || '';
    const autostart = params.get('autostart') === '1';

    // Параметр из t.me-ссылки (?startapp=...)
    const startParam = tg?.initDataUnsafe?.start_param;
    if (!q && startParam) {
      try { q = decodeURIComponent(startParam); } catch (_) { q = startParam; }
    }

    const input = document.getElementById('queryInput');
    input.value = q;

    updateFreeBadge(5, 5);

    pingApi().then((ok) => {
      if (q && autostart && ok) {
        setStatus('Запускаю анализ…', 'busy');
        setTimeout(() => startChat(), 400);
      } else if (q && autostart && !ok) {
        setStatus('API недоступен — сначала запусти сервер', 'err');
      } else if (q) {
        setStatus(ok ? 'Идея подставлена — нажми Старт' : 'API недоступен', ok ? 'ok' : 'err');
      } else if (!ok) {
        setStatus('API недоступен — запусти backend + zrok', 'err');
      }
    });
  }

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', boot)
    : boot();
})();

// global helper for copy buttons inside HTML
window.__copyLink = async function (url) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(url);
    } else {
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    try {
      window.Telegram?.WebApp?.showPopup?.({ title: 'Скопировано', message: 'Ссылка скопирована в буфер обмена.', buttons: [{ type: 'ok' }] });
    } catch (_) {}
  } catch (e) {
    alert('Не удалось скопировать ссылку: ' + (e?.message || e));
  }
};
</script>

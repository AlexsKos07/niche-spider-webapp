<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niche Spider: Business Map</title>
    
    <!-- Библиотеки -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://unpkg.com/vis-network/styles/vis-network.min.css" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Верхняя панель управления */
        #controls {
            padding: 15px;
            background-color: var(--secondary-bg);
            border-bottom: 1px solid #ddd;
            display: flex; gap: 10px; align-items: center;
            z-index: 5;
        }

        input {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc;
            background: #fff; color: #000; outline: none; font-size: 16px;
        }

        button#buildBtn {
            padding: 10px 20px; border-radius: 8px; border: none;
            background-color: var(--button-color); color: var(--button-text-color);
            font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* Область графа */
        #graph-container {
            flex: 1; position: relative; background-color: #f5f5f5; /* Светлый фон для контраста */
        }
        #mynetwork { width: 100%; height: 100%; }

        /* Панель деталей (всплывающая снизу) */
        #details-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            max-height: 40%; overflow-y: auto; z-index: 10;
            color: #000;
        }
        #details-panel.active { transform: translateY(0); }
        
        .detail-title { font-weight: 800; font-size: 20px; margin-bottom: 10px; color: #333; }
        .detail-item { margin-bottom: 6px; font-size: 15px; line-height: 1.4; }
        
        #closeBtn {
            margin-top: 15px; width: 100%; padding: 12px;
            background: #eee; color: #333; border: none; border-radius: 10px;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* Лоадер */
        #loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8); 
            display: flex; justify-content: center; align-items: center;
            z-index: 20; display: none; font-size: 18px; font-weight: bold; color: #555;
        }
    </style>
</head>
<body>

    <!-- Управление -->
    <div id="controls">
        <input type="text" id="queryInput" placeholder="Введите нишу (напр. Кофейня)...">
        <button id="buildBtn" onclick="loadGraph()">Построить</button>
    </div>

    <!-- Граф -->
    <div id="graph-container">
        <div id="mynetwork"></div>
        <div id="loading-overlay">🕷️ Анализирую...</div>
        
        <!-- Панель деталей -->
        <div id="details-panel">
            <div class="detail-title" id="detail-title">Название узла</div>
            <div id="detail-content"></div>
            <button id="closeBtn" onclick="closeDetails()">Закрыть</button>
        </div>
    </div>

<script type="text/javascript">
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ВАЖНО: Вставь сюда СВОЮ ссылку Ngrok (с /analyze в конце!)
    // Пример: 'https://basically-unhappily-subtitle.ngrok-free.de/analyze'
    const API_URL = 'https://4t8qgn49lvqr.shares.zrok.io/analyze';

    let network = null;
    const nodes = new vis.DataSet([]);
    const edges = new vis.DataSet([]);

    const container = document.getElementById('mynetwork');
    
    // Настройки Vis.js
    const options = {
        nodes: { 
            shape: 'dot', size: 25, 
            font: { size: 14, color: '#000000', face: 'arial' }, 
            borderWidth: 2, shadow: true 
        },
        edges: { 
            width: 2, shadow: true, arrows: 'to',
            smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.4 },
            color: { color: '#777777' }
        },
        groups: {
            root: { color: { background: '#FF5733', border: '#C70039' }, size: 35 },
            product: { color: { background: '#33FF57', border: '#00C700' } },
            supplier: { color: { background: '#FFD700', border: '#DAA520' }, shape: 'square' },
            warehouse: { color: { background: '#87CEEB', border: '#4682B4' }, shape: 'database' },
            competitor: { color: { background: '#FF69B4', border: '#C71585' }, shape: 'triangle' }
        },
        physics: { 
            stabilization: false, 
            barnesHut: { gravitationalConstant: -2000, springLength: 150 } 
        },
        interaction: { hover: true, tooltipDelay: 200 }
    };

    // Создаем сеть
    network = new vis.Network(container, { nodes: nodes, edges: edges }, options);

    // Обработка клика по узлу
    network.on("click", function (params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const nodeData = nodes.get(nodeId);
            showDetails(nodeData);
        } else {
            closeDetails();
        }
    });

    function showDetails(node) {
        const panel = document.getElementById('details-panel');
        const title = document.getElementById('detail-title');
        const content = document.getElementById('detail-content');
        
        title.innerText = node.label || "Информация";
        
        let html = '';
        if (node.group === 'root') {
            html = `<div class="detail-item"><b>Ниша:</b> ${node.label}</div>
                    <div class="detail-item"><b>Статус:</b> Анализ завершен</div>`;
        } else if (node.group === 'product') {
            html = `<div class="detail-item"><b>Тип:</b> Товар</div>
                    <div class="detail-item"><b>Маржинальность:</b> ~25-30%</div>
                    <div class="detail-item"><b>Спрос:</b> Высокий</div>`;
        } else if (node.group === 'supplier') {
            html = `<div class="detail-item"><b>Тип:</b> Поставщик</div>
                    <div class="detail-item"><b>Локация:</b> Китай / РФ</div>
                    <div class="detail-item"><b>Условия:</b> Опт от 10 шт.</div>`;
        } else if (node.group === 'warehouse') {
            html = `<div class="detail-item"><b>Тип:</b> Фульфилмент</div>
                    <div class="detail-item"><b>Цена хранения:</b> ~15 руб/сутки</div>
                    <div class="detail-item"><b>Упаковка:</b> Включена</div>`;
        } else {
            html = `<div class="detail-item"><b>Информация:</b> Данные загружены из AI-графа</div>`;
        }
        
        content.innerHTML = html;
        panel.classList.add('active');
    }

    function closeDetails() {
        document.getElementById('details-panel').classList.remove('active');
    }

    async function loadGraph() {
        const query = document.getElementById('queryInput').value.trim();
        if (!query) return alert("Введите тему ниши!");

        const loading = document.getElementById('loading-overlay');
        loading.style.display = 'flex';
        closeDetails();

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    // ВАЖНО: Этот заголовок обходит проверку Ngrok
                    'ngrok-skip-browser-warning': 'true' 
                },
                body: JSON.stringify({ query: query })
            });         

            if (!response.ok) throw new Error(`Ошибка API: ${response.status}`);

            const data = await response.json();
            
            // Очищаем старый граф
            nodes.clear(); edges.clear();

            // Добавляем новые данные
            if (data.graph_nodes && data.graph_edges) {
                nodes.add(data.graph_nodes);
                edges.add(data.graph_edges);
                
                // Центрируем камеру на корне (id: 0)
                network.focus(0, { animation: true, scale: 1.2 });
            }

        } catch (e) {
            console.error(e);
            alert("Ошибка соединения с сервером. Проверьте консоль или запущен ли Ngrok.");
        } finally {
            loading.style.display = 'none';
        }
    }

    // Загружаем дефолтный граф при открытии
    document.getElementById('queryInput').value = "Кофейня";
    loadGraph();

</script>
</body>
</html>
